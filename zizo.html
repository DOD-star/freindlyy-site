<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIZO HUB | دخول الغرفة</title>
    <style>
        :root { --ps-blue: #0072ce; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: var(--bg); color: white; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at top right, #1a1a2e, #05070a);
        }
        .panel {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .robot-icon {
            width: 100px; height: 100px; margin: 0 auto 20px;
            background: var(--ps-blue); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--ps-blue);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        input {
            width: 100%; padding: 15px; margin: 20px 0;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 1.2rem;
        }
        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px;
        }
        .btn-primary { background: var(--ps-blue); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--ps-blue); color: var(--ps-blue); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="panel">
        <div class="robot-icon">🤖</div>
        <h2>غرفة زيزو السحرية</h2>
        <p style="opacity: 0.7; margin-top: 10px;">أدخل كود الغرفة للانضمام</p>
        
        <input type="text" id="roomCode" placeholder="كود الغرفة هنا...">
        
        <button class="btn btn-primary" onclick="joinRoom()">دخول الغرفة</button>
        <button class="btn btn-outline" onclick="createRoom()">إنشاء غرفة جديدة</button>
        
        <p id="msg" style="margin-top: 15px; font-size: 0.9rem; color: #00f2ff;"></p>
    </div>

    <script>
        function createRoom() {
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('msg').innerText = "تم إنشاء الغرفة! الكود: " + code;
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            if(code.trim() !== "") {
                localStorage.setItem('activeRoom', code);
                window.location.href = "zizo-room.html"; // هينقله للصفحة التانية
            } else {
                alert("اكتب الكود الأول يا بطل!");
            }
        }
    </script>
</body>
</html>
