<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حكايات السهرة | استوديو الفن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff8c00; --bg: #0a0a0a; --panel: #161616; --text: #e0e0e0; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }

        /* شاشة التقييم */
        #rating-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .rating-box { background: var(--panel); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); text-align: center; min-width: 350px; box-shadow: 0 0 30px var(--primary); }
        .user-id { font-size: 14px; color: #888; margin-bottom: 10px; }

        /* القائمة اليمنى (اللاعبين) */
        .players-sidebar { width: 180px; background: var(--panel); border-left: 2px solid #222; padding: 15px; }
        #players-list { display: flex; flex-direction: column; gap: 12px; }
        .player-item { display: flex; align-items: center; gap: 10px; background: #222; padding: 8px; border-radius: 10px; font-size: 14px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; }

        /* منطقة الرسم */
        .game-area { flex: 1; display: flex; flex-direction: column; }
        .header { height: 60px; background: #111; display: flex; align-items: center; justify-content: space-around; border-bottom: 2px solid var(--primary); }
        .canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #1a1a1a; padding: 15px; }
        canvas { background: white; border-radius: 10px; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* الشات */
        .chat-sidebar { width: 280px; background: var(--panel); border-right: 2px solid #222; display: flex; flex-direction: column; }
        #chat-content { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; background: #222; font-size: 13px; line-height: 1.5; border-right: 3px solid transparent; }
        .msg.user { border-right-color: #00d2ff; }
        .msg.zizo { border-right-color: var(--primary); }
        .zizo-name { color: var(--primary); font-weight: bold; }
        #chat-input { margin: 10px; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }

        /* الأدوات */
        .footer-tools { height: 80px; background: #111; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 1px solid #333; }
        .color-dot { width: 25px; height: 25px; border-radius: 5px; cursor: pointer; border: 1px solid #fff; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.2); }
        .tool-btn { background: #333; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; }
        .tool-btn.active { background: var(--primary); border-color: white; }
    </style>
</head>
<body>

    <div id="rating-overlay">
        <div class="rating-box">
            <div class="user-id">لاعب ID: #EYAD-PRO</div>
            <h2 id="rating-title">تقييم زيزو للرسمة</h2>
            <div id="score-text" style="font-size: 60px; color: var(--primary); font-weight: bold; margin: 10px 0;">? / 10</div>
            <p id="zizo-opinion" style="margin: 15px 0; color: #ccc; min-height: 50px;"></p>
            <button onclick="nextPlayer()" style="background:var(--primary); border:none; padding:10px 40px; border-radius:8px; color:white; cursor:pointer; font-weight:bold; font-size: 18px;">التالي ➡️</button>
        </div>
    </div>

    <div class="players-sidebar">
        <h4 style="color:var(--primary); margin: 0 0 15px 0; text-align: center;">المتصلون</h4>
        <div id="players-list">
            </div>
    </div>

    <div class="game-area">
        <div class="header">
            <div id="timer-box" style="font-size: 20px;">⏳ <span id="timer" style="color:var(--primary)">60</span> ثانية</div>
            <div id="current-word">الكلمة: <span style="color:var(--primary)" id="word-display">بطيخة</span></div>
            <div>دور: <span id="active-player" style="color:var(--primary)">إياد</span></div>
        </div>
        <div class="canvas-container">
            <canvas id="mainCanvas" width="800" height="480"></canvas>
        </div>
        <div class="footer-tools">
            <div style="display:flex; gap:8px;" id="colors-list"></div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span>حجم القلم:</span>
                <input type="range" id="penSize" min="1" max="50" value="5" style="accent-color: var(--primary);">
            </div>
            <button class="tool-btn" onclick="clearCanvas()">🗑️ مسح اللوحة</button>
            <button class="tool-btn" id="eraser-btn" onclick="toggleEraser()">🧽 مساحة</button>
        </div>
    </div>

    <div class="chat-sidebar">
        <div style="background:var(--primary); color:black; padding:12px; text-align:center; font-weight:bold;">غرفة الدردشة</div>
        <div id="chat-content">
            <div class="msg zizo"><span class="zizo-name">زيزو:</span> مستني إيه؟ ابدأ رسم يا فنان!</div>
        </div>
        <input type="text" id="chat-input" placeholder="اكتب تخمينك هنا...">
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const chatInput = document.getElementById('chat-input');
    const chatContent = document.getElementById('chat-content');
    
    let drawing = false;
    let currentColor = '#000000';
    let isEraser = false;
    let timeLeft = 60;
    let timer;

    // 1. نظام الشات
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && chatInput.value.trim() !== "") {
            const val = chatInput.value;
            addMsg("أنت", val, "user");
            checkGuess(val);
            chatInput.value = "";
        }
    });

    function addMsg(user, text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<span class="${type === 'zizo' ? 'zizo-name' : ''}">${user}:</span> ${text}`;
        chatContent.appendChild(div);
        chatContent.scrollTop = chatContent.scrollHeight;
    }

    function checkGuess(val) {
        if(val.includes("بطيخ")) {
            setTimeout(() => addMsg("زيزو", "صح! إنت تلميذي بجد 🍉🔥", "zizo"), 500);
        }
    }

    // 2. محرك الرسم
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); };
    canvas.onmouseup = () => drawing = false;
    canvas.onmousemove = (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineWidth = document.getElementById('penSize').value;
        ctx.strokeStyle = isEraser ? '#ffffff' : currentColor;
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    };

    // 3. التايمر والتقييم النهائي
    function startClock() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timer); showRating(); }
        }, 1000);
    }

    function showRating() {
        const score = Math.floor(Math.random() * 10) + 1;
        const overlay = document.getElementById('rating-overlay');
        const feedback = document.getElementById('zizo-opinion');
        
        document.getElementById('score-text').innerText = score + "/10";
        overlay.style.display = 'flex';

        if(score > 7) {
            feedback.innerHTML = "<b>زيزو بيقولك:</b> والله برافو.. الرسمة دي تتباع بملايين في سوق العبور!";
            document.getElementById('score-text').style.color = "#2ecc71";
        } else {
            feedback.innerHTML = "<b>زيزو بيقولك:</b> إيه ده؟ دي رسمة ولا خناقة عصافير؟ هزقتني قدام الأجانب!";
            document.getElementById('score-text').style.color = "#e74c3c";
        }
    }

    function nextPlayer() {
        document.getElementById('rating-overlay').style.display = 'none';
        clearCanvas();
        timeLeft = 60;
        startClock();
    }

    // 4. الأدوات والألوان
    const colors = ['#000000', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff8c00', '#a349a4'];
    colors.forEach(c => {
        const d = document.createElement('div');
        d.className = 'color-dot'; d.style.background = c;
        d.onclick = () => { currentColor = c; isEraser = false; updateBtns(); };
        document.getElementById('colors-list').appendChild(d);
    });

    function toggleEraser() { isEraser = !isEraser; updateBtns(); }
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function updateBtns() {
        document.getElementById('eraser-btn').classList.toggle('active', isEraser);
    }

    // تشغيل اللعبة
    startClock();
</script>
</body>
</html>
