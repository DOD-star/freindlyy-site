<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMES HUB | واجهة الألعاب</title>
    <style>
        :root {
            --ps-blue: #0072ce;
            --ps-glow: rgba(0, 114, 206, 0.6);
            --bg-dark: #020510;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1a1a2e, #020510);
            overflow-x: hidden;
        }

        /* هيدر البروفايل - قابل للضغط للعودة */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.3s ease;
        }

        .user-info:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #player-img {
            width: 45px; height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--ps-blue);
        }

        .logo h1 { font-style: italic; font-size: 1.5rem; letter-spacing: 2px; }

        /* حاوية الألعاب */
        .container { padding: 40px 5%; }
        
        .welcome-section { margin-bottom: 40px; }
        .welcome-section h2 { font-size: 2.2rem; margin-bottom: 10px; }
        .welcome-section p { opacity: 0.6; }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        /* كارت اللعبة PS Style */
        .game-card {
            position: relative;
            border-radius: 20px;
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #111;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .game-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .game-card:hover {
            transform: scale(1.08);
            border-color: white;
            box-shadow: 0 0 30px var(--ps-glow);
        }

        .game-info {
            position: absolute;
            bottom: 0; width: 100%;
            padding: 25px 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 70%);
            text-align: right;
        }

        .game-info h3 { font-size: 1.3rem; margin-bottom: 5px; color: #fff; }
        .game-info p { font-size: 0.9rem; color: #ccc; line-height: 1.4; }

    </style>
</head>
<body>

    <header>
        <div class="logo"><h1>GAMES<span style="color:var(--ps-blue)">HUB</span></h1></div>
        
        <div class="user-info" onclick="window.location.href='index.html'" title="تعديل بياناتك">
            <span id="player-name">تحميل...</span>
            <img src="" id="player-img" alt="Profile">
        </div>
    </header>

    <div class="container">
        <div class="welcome-section">
            <h2 id="welcome-msg">أهلاً بك</h2>
            <p>اختر عالمك الخاص وابدأ التحدي مع الأصدقاء.</p>
        </div>

        <div class="games-grid" id="main-grid">
            </div>
    </div>

    <script>
        // 1. جلب بيانات المستخدم
        const userData = JSON.parse(localStorage.getItem('userData')) || {name: "لاعب جديد"};
        const userAvatar = localStorage.getItem('userAvatar') || "https://via.placeholder.com/45";

        document.getElementById('player-name').innerText = userData.name;
        document.getElementById('player-img').src = userAvatar;
        document.getElementById('welcome-msg').innerText = `جاهز للعب يا ${userData.name}؟`;

        // 2. مصفوفة الألعاب بالأسماء والكابشنز المطلوبة
        const myGames = [
            { 
                name: "لعبة زيزو", 
                caption: "زيزو عايزك جوه في موضوع سري.. 🤫", 
                image: "zizo.jpg", 
                link: "zizo.html" 
            },
            { 
                name: "سباق المحترفين", 
                caption: "خش مع صحابك سباق عربيات وشوف مين يكسب 🏎️", 
                image: "racing.jpg", 
                link: "racing.html" 
            },
            { 
                name: "شطرنج الضحك", 
                caption: "شطرنج عادي.. بس زيزو هيخليها مش عادي.. 😂", 
                image: "chess.jpg", 
                link: "funny-chess.html" 
            },
            { 
                name: "تحدي الصراحة (Online)", 
                caption: "لعبة كشف المستور.. جهزي الردود يا بنات! 🎤", 
                image: "truth.jpg", 
                link: "truth-or-dare.html" 
            }
        ];

        // 3. عرض الألعاب في الصفحة
        const grid = document.getElementById('main-grid');
        
        myGames.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => window.location.href = game.link;
            
            card.innerHTML = `
                <img src="${game.image}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/300x450/111/fff?text=الصورة_قريباً'">
                <div class="game-info">
                    <h3>${game.name}</h3>
                    <p>${game.caption}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
