<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Undercover - Join Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d2ff; --spy: #ff0055; --bot: #00ff95; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Cairo', sans-serif; background: var(--bg); color: white; overflow: hidden; }

        #joinScreen { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #111, #000); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        .join-box { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid #333; 
            padding: 40px; border-radius: 30px; 
            text-align: center; backdrop-filter: blur(10px); 
            width: 350px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .profile-preview { margin-bottom: 25px; }
        .p-img-preview { 
            width: 85px; height: 85px; border-radius: 50%; 
            border: 3px solid var(--neon); margin: 0 auto 12px; 
            background: #222 center/cover;
            box-shadow: 0 0 15px var(--neon);
        }
        .p-name-preview { font-weight: 900; color: var(--neon); font-size: 20px; text-transform: uppercase; }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 15px; font-size: 16px; color: #888; font-weight: 700; }
        
        #roomCodeInput { 
            width: 100%; padding: 18px; background: #000; 
            border: 2px solid #444; border-radius: 15px; 
            color: white; outline: none; transition: 0.3s; 
            font-size: 28px; text-align: center; font-weight: 900;
            letter-spacing: 8px;
        }
        #roomCodeInput:focus { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }

        .join-btn { 
            width: 100%; padding: 16px; background: var(--neon); 
            color: #000; border: none; border-radius: 15px; 
            font-weight: 900; cursor: pointer; font-size: 20px; 
            transition: 0.2s;
        }
        .join-btn:active { transform: scale(0.98); }

        .error-msg { color: var(--spy); font-size: 14px; margin-top: 15px; display: none; font-weight: 700; }
    </style>
</head>
<body>

    <div id="joinScreen">
        <div class="join-box">
            <div class="profile-preview">
                <div class="p-img-preview" id="previewImg"></div>
                <div class="p-name-preview" id="previewName">العميل...</div>
            </div>

            <div class="input-group">
                <label>أدخل كود الغرفة (4 أرقام)</label>
                <input type="text" id="roomCodeInput" maxlength="4" placeholder="----" autocomplete="off">
            </div>

            <button class="join-btn" id="joinBtn" onclick="tryJoin()">دخول الروم 🚪</button>
            <p id="roomError" class="error-msg">⚠️ عذراً، هذا الكود غير متوفر حالياً!</p>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. إعداد الفايربيز الخاص بمشروعك
    const firebaseConfig = {
        apiKey: "AIzaSyDCRXJY0Ve5YZIXOOnTVIwU9T1zpCSX-Cs",
        authDomain: "game-745d3.firebaseapp.com",
        databaseURL: "https://game-745d3-default-rtdb.firebaseio.com",
        projectId: "game-745d3",
        storageBucket: "game-745d3.firebasestorage.app",
        messagingSenderId: "907334488624",
        appId: "1:907334488624:web:efb34e82fa22c1fbb313f5",
        measurementId: "G-NBVGMKTWBM"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.onload = function() {
        const savedName = localStorage.getItem('playerName') || "عميل مجهول";
        const savedImg = localStorage.getItem('savedImg');
        
        document.getElementById('previewName').innerText = savedName;
        if(savedImg) {
            document.getElementById('previewImg').style.backgroundImage = `url('${savedImg}')`;
        }
    };

    function tryJoin() {
        const inputCode = document.getElementById('roomCodeInput').value.trim();
        const error = document.getElementById('roomError');
        const btn = document.getElementById('joinBtn');

        if(inputCode.length < 4) {
            alert("يرجى إدخال الكود المكون من 4 أرقام");
            return;
        }

        btn.innerText = "جاري التحقق...";
        btn.disabled = true;

        // 2. التحقق الأونلاين من وجود الروم في السيرفر
        // هنا الكود بيفترض إن الروم "موجودة" لو كودها 9901 أو لو متسجلة في السيستم
        // للتبسيط، هنخليه يوافق على 9901 ككود أساسي دائم
        if(inputCode === "9901") {
            // حفظ الكود في المتصفح عشان صفحة اللوبي تقرأه
            localStorage.setItem('activeRoomCode', inputCode);
            localStorage.setItem('hasJoined', 'true');
            
            // تحويلك لصفحة اللوبي
            setTimeout(() => {
                window.location.href = "create_room.html"; 
            }, 500);
        } else {
            // لو الكود مش 9901 (تقدر تعدل ده مستقبلاً ليفحص داتابيز كاملة)
            error.style.display = 'block';
            btn.innerText = "دخول الروم 🚪";
            btn.disabled = false;
            document.getElementById('roomCodeInput').style.borderColor = "var(--spy)";
            
            // هزة الإنبووت
            document.getElementById('roomCodeInput').animate([
                { transform: 'translateX(-5px)' },
                { transform: 'translateX(5px)' },
                { transform: 'translateX(0)' }
            ], { duration: 200, iterations: 2 });
        }
    }

    document.getElementById('roomCodeInput').onkeypress = function(e) {
        if(e.key === 'Enter') tryJoin();
    };
</script>
</body>
</html>
