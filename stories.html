<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجلس زيزو الغاضب 😡</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #ff8c00; --dark-bg: #050505; --chat-bg: rgba(20, 20, 20, 0.9); }
        
        body { 
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1a0a00 0%, #000 100%);
            height: 100vh; overflow: hidden; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        .board {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 140, 0, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 140, 0, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }

        .top-right-badge {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 140, 0, 0.1);
            border: 1px solid var(--gold);
            padding: 5px 15px; border-radius: 8px;
            font-size: 12px; color: var(--gold);
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.2);
            z-index: 100;
        }

        .online-sidebar {
            position: fixed; right: 20px; top: 80px;
            width: 150px; background: rgba(255, 140, 0, 0.05);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 15px; padding: 10px;
            backdrop-filter: blur(5px);
        }
        .online-sidebar h3 { font-size: 14px; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 5px; color: var(--gold); }
        .user-list { list-style: none; padding: 0; margin: 0; }
        .user-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
        .status-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; }

        #chat-container {
            position: fixed; bottom: 30px; width: 90%; max-width: 500px;
            background: var(--chat-bg); border: 2px solid var(--gold);
            border-radius: 20px; padding: 15px; box-shadow: 0 0 30px rgba(255, 140, 0, 0.2);
        }

        #messages {
            height: 300px; overflow-y: auto; display: flex; flex-direction: column;
            gap: 10px; padding-right: 10px; margin-bottom: 15px;
        }

        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 15px; line-height: 1.6; }
        .user-msg { align-self: flex-start; background: #333; color: #fff; border-bottom-left-radius: 2px; }
        .zizo-msg { align-self: flex-end; background: var(--gold); color: #000; font-weight: bold; border-bottom-right-radius: 2px; box-shadow: 0 4px 10px rgba(255,140,0,0.3); }

        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; outline: none; }
        button { background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e67e00; transform: scale(1.05); }

        .zizo-status { position: fixed; top: 20px; text-align: center; }
        .zizo-status h1 { margin: 0; color: var(--gold); text-shadow: 0 0 10px var(--gold); font-size: 24px; }
        .zizo-avatar { font-size: 60px; filter: drop-shadow(0 0 10px var(--gold)); }

        @media (max-width: 768px) {
            .online-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="board"></div>

    <div class="top-right-badge">
        <span>V 2.0.4 | SERVER-RUNNING</span>
    </div>

    <div class="online-sidebar">
        <h3>المتصلين الآن</h3>
        <div class="user-list" id="userList">
            </div>
    </div>

    <div class="zizo-status">
        <div class="zizo-avatar">🤖</div>
        <h1>زيزو موده مش تمام</h1>
    </div>

    <div id="chat-container">
        <div id="messages">
            </div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="اهبب قول أي حاجة..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        // --- إعدادات فايربيس (املا البيانات دي من حسابك) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // اسم عشوائي للمستخدم
        const myName = "مستخدم_" + Math.floor(Math.random() * 1000);
        const userStatusRef = database.ref('online_users/' + myName);

        // تسجيل دخول وخروج المستخدم
        userStatusRef.set(true);
        userStatusRef.onDisconnect().remove();

        // مراقبة المستخدمين الأونلاين
        database.ref('online_users').on('value', (snapshot) => {
            const users = snapshot.val();
            const list = document.getElementById('userList');
            list.innerHTML = "";
            for (let id in users) {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<span class="status-dot"></span> ${id === myName ? 'أنت' : id}`;
                list.appendChild(div);
            }
            // إضافة زيزو دايماً
            const zizoDiv = document.createElement('div');
            zizoDiv.className = 'user-item';
            zizoDiv.innerHTML = `<span class="status-dot"></span> زيزو (Bot)`;
            list.appendChild(zizoDiv);
        });

        // ردوود زيزو
        const zizoReplies = [
            "إنت لسه هترغي؟ اخلص!", "بقولك إيه، روح نام أحسن لك بدل ما أهزقك.", "هو إنت موراكش غيري يا بارد؟",
            "يا واد اتقل كدة بلاش خفة..", "ده كلام تقوله لواحد في هيبتي؟ جاتك نيلة!", "مش فاضي لك، برتب المجلس.",
            "إنت فاكر نفسك مين ياض؟", "كلمة كمان وهطردك من الأوضة!", "زيزو مبيحبش اللت والعجن الكتير.",
            "يا مثبت العقل والدين، إيه الذكاء ده؟", "اكتب عدل يا ابني بدل ما أكسر لك الكيبورد ده.",
            "إنت جيت؟ يا فتاح يا عليم..", "بطل كلام وروح هات لنا كوباية شاي.",
            "أنا زيزو يا حبيبي، ركز!", "إنت لسه هنا؟ غور ياض.",
            "كلامك زي وشك، ملوش لازمة.", "اتلم بدل ما ألمك!"
        ];

        function handleKey(e) { if(e.key === 'Enter') sendMessage(); }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (text === "") return;

            // إرسال الرسالة لفايربيس
            database.ref('messages').push({
                sender: myName,
                text: text,
                type: 'user'
            });

            input.value = "";

            // رد زيزو (هيتسجل برضه في فايربيس عشان الكل يشوفه)
            setTimeout(() => {
                const reply = zizoReplies[Math.floor(Math.random() * zizoReplies.length)];
                database.ref('messages').push({
                    sender: "زيزو",
                    text: reply,
                    type: 'zizo'
                });
            }, 800);
        }

        // استقبال الرسائل وعرضها
        database.ref('messages').limitToLast(15).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const senderName = (data.sender === myName) ? "أنت" : data.sender;
            const msgClass = (data.type === 'zizo') ? 'zizo-msg' : 'user-msg';
            addMessage(senderName, data.text, msgClass);
        });

        function addMessage(sender, text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${className}`;
            msgDiv.innerText = `${sender}: ${text}`;
            const container = document.getElementById('messages');
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
