<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حكايات السهرة | الغرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; overflow: hidden; font-family: 'Cairo', sans-serif; 
            background: #050505 url('bg.jpg') no-repeat center center fixed; background-size: cover;
        }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .ui-layer * { pointer-events: auto; }

        #room-code-bar {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 15px; border: 1px solid rgba(255,140,0,0.3);
            color: white; font-size: 16px; direction: ltr; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #room-code-bar span { color: #ff8c00; font-weight: bold; font-size: 20px; margin-left: 5px; }

        #status-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 140, 0, 0.2); backdrop-filter: blur(15px);
            padding: 12px 40px; border-radius: 50px; border: 2px solid #ff8c00;
            color: #ff8c00; font-weight: bold; font-size: 18px; box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
        }

        #chat-box {
            position: absolute; bottom: 20px; right: 20px; width: 350px;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 15px; display: flex; flex-direction: column;
        }
        #messages { 
            height: 280px; overflow-y: auto; color: white; margin-bottom: 10px; 
            display: flex; flex-direction: column; padding: 5px; scroll-behavior: smooth;
        }
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }

        .msg { margin-bottom: 8px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.08); font-size: 14px; }
        .zizo-text { color: #ff8c00; font-weight: bold; }
        .user-text { color: #00d2ff; font-weight: bold; }

        #cInput {
            background: rgba(255, 255, 255, 0.1); border: 2px solid #ff8c00;
            padding: 12px; color: white; border-radius: 12px; outline: none; width: 90%;
            font-family: 'Cairo'; align-self: center;
        }

        #ready-btn {
            position: absolute; bottom: 30px; left: 30px;
            padding: 20px 60px; background: linear-gradient(45deg, #ff8c00, #ff5500);
            border: none; border-radius: 15px; color: white; font-weight: bold;
            font-size: 22px; cursor: pointer; transition: 0.4s; box-shadow: 0 0 25px rgba(255, 85, 0, 0.4);
        }
        #ready-btn.active { background: linear-gradient(45deg, #2ecc71, #27ae60); box-shadow: 0 0 30px rgba(46, 204, 113, 0.6); }
    </style>
</head>
<body>

<div class="ui-layer">
    <div id="room-code-bar">كود السهرة: <span id="room-code-num">...</span></div>
    <div id="status-bar">زيزو: "اخلص ياض دوس ريدي عشان نبدأ!"</div>

    <div id="chat-box">
        <div id="messages">
            <div class="msg"><span class="zizo-text">زيزو:</span> منورين يا شوية فاشلين.. القعدة دي شكلها هتطول بكرة!</div>
        </div>
        <input type="text" id="cInput" placeholder="اكتب هنا ودوس Enter..." autocomplete="off">
    </div>

    <button id="ready-btn" onclick="toggleReady()">READY</button>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

    // كود الغرفة
    document.getElementById('room-code-num').innerText = "5590";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    function createNameLabel(name) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 128;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, 512, 128);
        ctx.font = 'Bold 60px Cairo'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
        ctx.fillText(name, 256, 85);
        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
        sprite.scale.set(4, 1, 1);
        return sprite;
    }

    const radius = 5;
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;

        const chair = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.5, 1.2),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
        );
        chair.position.set(x, 0.25, z);
        chair.lookAt(0, 0.25, 0);
        scene.add(chair);

        const nameLabel = createNameLabel(i === 0 ? "إياد (الأدمن)" : "لاعب " + (i + 1));
        nameLabel.position.set(x, 2.2, z);
        scene.add(nameLabel);
    }

    camera.position.set(0, 9, 13);
    camera.lookAt(0, 0, 0);

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    // --- الشات وزيزو ---
    const zizoReplies = ["بتقول إيه ياض؟", "يا عجل إنت كفاية رغي!", "إنت مستحمل فشلك ده إزاي؟", "خلص ياض السهرة هتبوظ!", "منورين يا شوية بهايم!", "أنا زيزو يا بابا!", "زيزو بيقولك: اسكت خالص!"];
    const cInput = document.getElementById('cInput');
    const messages = document.getElementById('messages');
    const userData = JSON.parse(localStorage.getItem('user_p')) || {name: 'إياد'};

    function addMsg(user, txt, isZizo) {
        const div = document.createElement('div');
        div.className = "msg";
        div.innerHTML = `<span class="${isZizo ? 'zizo-text' : 'user-text'}">${user}:</span> ${txt}`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight; 
    }

    cInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const val = cInput.value.trim();
            if (val !== "") {
                addMsg(userData.name, val, false);
                cInput.value = "";
                setTimeout(() => {
                    const reply = zizoReplies[Math.floor(Math.random() * zizoReplies.length)];
                    addMsg("زيزو", reply, true);
                }, 600);
            }
        }
    });

    // --- منطق الأدمن والبداية ---
    window.toggleReady = () => {
        const btn = document.getElementById('ready-btn');
        btn.classList.toggle('active');
        
        if (btn.classList.contains('active')) {
            btn.innerText = "READY ✓";
            addMsg("زيزو", "الأدمن جاهز.. يلا يا بهايم خلصوا!", true);
            
            // بما إنك الأدمن، هيدخلك بعد ثانيتين تشوف الوضع
            setTimeout(() => {
                window.location.href = 'draw_game.html'; 
            }, 1500);
        } else {
            btn.innerText = "READY";
        }
    };
</script>
</body>
</html>
