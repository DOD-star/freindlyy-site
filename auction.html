<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHRA | المزاد الملكي 💰</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --bg: #05070a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* الهيدر */
        .auction-header { padding: 15px 25px; background: rgba(20,20,30,0.9); border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* منطقة المزاد */
        .auction-area { flex: 2; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #222; }
        .item-card { background: rgba(255,255,255,0.03); border-radius: 30px; width: 100%; max-width: 450px; padding: 30px; text-align: center; border: 1px solid rgba(255,215,0,0.3); box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; }
        .item-img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--gold)); }
        
        .price-tag { font-size: 2.5rem; color: var(--gold); font-weight: 900; margin: 10px 0; }
        .timer { font-size: 2.5rem; color: #ff3333; font-weight: 900; margin-top: 10px; font-family: monospace; }
        
        /* اللقب (Badge) */
        .player-title { 
            font-size: 0.75rem; padding: 3px 10px; border-radius: 6px; 
            background: var(--neon); color: #000; font-weight: bold; 
            box-shadow: 0 0 10px var(--neon); display: inline-block; margin: 5px;
        }

        /* الشات */
        .chat-area { flex: 1; background: rgba(10,10,15,0.9); display: flex; flex-direction: column; width: 350px; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); font-size: 0.9rem; border-right: 3px solid var(--pink); }
        .msg.system { border-right-color: var(--neon); color: var(--neon); text-align: center; font-weight: bold; }
        
        .chat-input { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #222; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; flex: 1; outline: none; }

        .btn-bid { background: linear-gradient(45deg, var(--gold), #b8860b); border: none; padding: 15px 40px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1.2rem; color: #000; transition: 0.2s; }
        .btn-bid:hover { transform: scale(1.05); }

        /* السايد بار (القائمة الجانبية) */
        .sidebar { 
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%; 
            background: rgba(5, 7, 10, 0.95); border-right: 2px solid var(--neon); 
            padding: 40px 20px; z-index: 500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.open { left: 0; }
        .balance-box { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 20px; border-radius: 20px; margin-top: 20px; }

        #room-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .entry-card { background: #111; padding: 40px; border-radius: 30px; border: 1px solid var(--neon); text-align: center; max-width: 350px; width: 90%; }
    </style>
</head>
<body>

<div id="room-overlay">
    <div class="entry-card">
        <h1 style="color: var(--neon); letter-spacing: 2px;">بوابة المزاد</h1>
        <p style="color: var(--gold); margin-bottom: 25px;">هدية الدخول: 2000 عملة 🪙</p>
        <input type="text" id="roomCode" placeholder="أدخل كود الغرفة">
        <button class="btn-bid" style="width: 100%; margin-top: 20px;" onclick="joinRoom()">استلام الهدية والدخول</button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div style="text-align: center;">
        <h2 style="color: var(--neon); margin-bottom: 20px;">MY PROFILE</h2>
        <img id="side-pfp" src="" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--pink); object-fit: cover;">
        <h3 id="side-name" style="margin: 15px 0 5px; font-size: 1.6rem;"></h3>
        <div id="side-badge-container">
            <span id="side-badge" class="player-title" style="display:none;"></span>
        </div>
        
        <div class="balance-box">
            <span style="color: #888; font-size: 0.8rem; display: block;">الرصيد الملكي</span>
            <span style="font-size: 2rem; font-weight: 900; color: var(--gold);">🪙 <span id="side-coins">0</span></span>
        </div>

        <button onclick="toggleSidebar()" style="background:none; border:none; color:#555; margin-top:30px; cursor:pointer;">إغلاق الحاوية</button>
    </div>
</div>

<div class="auction-header">
    <div style="display: flex; align-items: center; gap: 12px; cursor: pointer;" onclick="toggleSidebar()">
        <img id="u-pfp" src="" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon);">
        <div>
            <div style="font-weight: bold; font-size: 0.9rem;">
                <span id="u-name">المزايد</span>
                <span id="u-badge" class="player-title" style="display:none; font-size: 0.6rem;"></span>
            </div>
            <div style="color: var(--gold); font-size: 0.8rem;">🪙 <span id="u-coins">0</span></div>
        </div>
    </div>
    <h2 style="color: var(--neon); font-style: italic; margin: 0;">SOHRA</h2>
    <button onclick="exitAuction()" style="background:none; border:1px solid #444; color:#888; padding:8px 15px; border-radius:10px; cursor:pointer;">خروج 🚪</button>
</div>

<div class="main-layout">
    <div class="auction-area">
        <div class="item-card">
            <div id="item-count" style="color: var(--pink); font-weight: bold; margin-bottom: 10px;">عنصر نادٍ متاح</div>
            <img id="item-img" src="https://cdn-icons-png.flaticon.com/512/5969/5969212.png" class="item-img">
            <h2 id="item-name">لقب: الأسطورة 🔥</h2>
            <div class="price-tag">🪙 <span id="current-bid">100</span></div>
            <div id="winner-name" style="color: var(--neon); font-weight: bold;">أعلى مزايد: لا أحد</div>
            <div class="timer" id="timer">00:30</div>
        </div>
        <button class="btn-bid" style="margin-top:25px;" onclick="placeBid()">زايد بـ +100 🪙</button>
    </div>

    <div class="chat-area">
        <div id="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="chatIn" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" style="background:var(--neon); border:none; padding:10px; border-radius:10px; cursor:pointer;">🚀</button>
        </div>
    </div>
</div>

<script>
    // الجوائز المتاحة في المزاد
    const awards = [
        { name: "لقب: الأسطورة 🔥", img: "https://cdn-icons-png.flaticon.com/512/5969/5969212.png", badge: "LEGEND" },
        { name: "لقب: ملك السهرة 👑", img: "https://cdn-icons-png.flaticon.com/512/2553/2553351.png", badge: "KING" },
        { name: "لقب: الحريف ⚽", img: "https://cdn-icons-png.flaticon.com/512/3384/3384551.png", badge: "PRO" },
        { name: "لقب: الملياردير 💎", img: "https://cdn-icons-png.flaticon.com/512/2953/2953361.png", badge: "RICH" }
    ];
    let currentAwardIndex = 0;

    // بيانات المستخدم
    let user = {
        name: localStorage.getItem('user_name') || "مجهول",
        coins: parseInt(localStorage.getItem('user_coins')) || 2000,
        photo: localStorage.getItem('user_photo') || "https://api.dicebear.com/7.x/avataaars/svg?seed=1",
        title: localStorage.getItem('user_title') || ""
    };

    // حفظ الرصيد الابتدائي
    if(!localStorage.getItem('user_coins')) localStorage.setItem('user_coins', 2000);

    function updateAllUI() {
        // تحديث الهيدر
        document.getElementById('u-name').innerText = user.name;
        document.getElementById('u-coins').innerText = user.coins;
        document.getElementById('u-pfp').src = user.photo;
        
        // تحديث السايد بار (البروفايل)
        document.getElementById('side-name').innerText = user.name;
        document.getElementById('side-coins').innerText = user.coins;
        document.getElementById('side-pfp').src = user.photo;

        // تحديث الألقاب في كل مكان
        const uBadge = document.getElementById('u-badge');
        const sBadge = document.getElementById('side-badge');
        
        if(user.title) {
            uBadge.innerText = user.title;
            uBadge.style.display = 'inline-block';
            sBadge.innerText = user.title;
            sBadge.style.display = 'inline-block';
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function joinRoom() {
        let code = document.getElementById('roomCode').value;
        if(!code) return alert("من فضلك أدخل كود الغرفة");
        document.getElementById('room-overlay').style.display = 'none';
        updateAllUI();
        sendSystemMsg(`🎉 ${user.name} دخل المزاد واستلم هدية 2000 عملة!`);
    }

    function placeBid() {
        if(user.coins < 100) return alert("رصيدك خلص يا بطل!");
        
        let priceSpan = document.getElementById('current-bid');
        let newPrice = parseInt(priceSpan.innerText) + 100;
        priceSpan.innerText = newPrice;
        document.getElementById('winner-name').innerText = "أعلى مزايد: " + user.name;
        
        user.coins -= 100;
        localStorage.setItem('user_coins', user.coins);
        updateAllUI();
        sendSystemMsg(`🔥 ${user.name} زايد بـ ${newPrice}`);
    }

    // تايمر المزاد
    let timeLeft = 30;
    setInterval(() => {
        if(document.getElementById('room-overlay').style.display === 'none') {
            if(timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
            } else {
                let winner = document.getElementById('winner-name').innerText.replace("أعلى مزايد: ", "");
                if(winner !== "لا أحد") {
                    sendSystemMsg(`🎊 مبروك للفائز ${winner} باللقب!`);
                    if(winner === user.name) {
                        user.title = awards[currentAwardIndex].badge;
                        localStorage.setItem('user_title', user.title);
                        updateAllUI();
                    }
                }
                // تجهيز الجائزة التالية
                currentAwardIndex = (currentAwardIndex + 1) % awards.length;
                document.getElementById('item-name').innerText = awards[currentAwardIndex].name;
                document.getElementById('item-img').src = awards[currentAwardIndex].img;
                document.getElementById('current-bid').innerText = 100;
                document.getElementById('winner-name').innerText = "أعلى مزايد: لا أحد";
                timeLeft = 30;
            }
        }
    }, 1000);

    function sendChat() {
        let input = document.getElementById('chatIn');
        if(!input.value) return;
        addMsg(user.name, input.value, 'user', user.title);
        input.value = "";
    }

    function sendSystemMsg(t) { addMsg("System", t, 'system'); }

    function addMsg(u, t, type, title) {
        let div = document.createElement('div');
        div.className = "msg " + (type === 'system' ? 'system' : '');
        let titleTag = title ? `<span class="player-title" style="font-size:0.5rem; padding:1px 5px;">${title}</span>` : "";
        div.innerHTML = type === 'system' ? t : `${titleTag} <b>${u}:</b> ${t}`;
        let box = document.getElementById('chat-msgs');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function exitAuction() {
        location.href = 'index.html';
    }
</script>
</body>
</html>
