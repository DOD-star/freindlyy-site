<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiltrator | Confidential</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --neon: #39ff14; --spy: #ff0044; --wait: #ffaa00; --bg: #050505; }
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        .lobby-box {
            background: rgba(15, 15, 15, 0.98); padding: 40px; border-radius: 20px;
            border: 1px solid #222; text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        #secretAdminTrigger { 
            font-family: 'Orbitron'; color: var(--neon); letter-spacing: 5px; 
            margin-top: 0; cursor: pointer; user-select: none; transition: 0.3s;
        }
        #secretAdminTrigger:active { transform: scale(0.9); opacity: 0.5; }

        .access-section { margin-bottom: 20px; }
        .code-input {
            background: #000; border: 1px solid #333; color: var(--neon);
            padding: 12px; border-radius: 8px; width: 80%; text-align: center;
            font-family: 'Orbitron'; font-size: 18px; outline: none; transition: 0.3s;
        }
        .code-input:focus { border-color: var(--neon); }
        .player-list { display: flex; flex-direction: column; gap: 10px; margin: 25px 0; opacity: 0.1; pointer-events: none; transition: 0.4s; max-height: 200px; overflow-y: auto; }
        .player-list.active { opacity: 1; pointer-events: all; }
        .player-item { 
            background: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #222;
        }
        .status-badge { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-family: 'Orbitron'; }
        .bg-ready { background: var(--neon); color: black; font-weight: bold; }
        .bg-not { background: #222; color: #666; }
        .btn {
            border: none; padding: 18px; font-family: 'Orbitron'; font-weight: 900; 
            font-size: 16px; border-radius: 12px; cursor: not-allowed; transition: 0.3s; width: 100%;
            background: #1a1a1a; color: #444; outline: none;
        }
        .btn.unlocked { cursor: pointer; background: var(--wait); color: black; }
        .btn.is-start { background: var(--neon); box-shadow: 0 0 25px rgba(57, 255, 20, 0.6); color: black; }
        .kick-btn { background: var(--spy); color: white; border: none; border-radius: 5px; padding: 3px 10px; cursor: pointer; margin-right: 10px; font-weight: bold; font-size: 10px; }
        .host-mark { color: var(--wait); font-size: 12px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="lobby-box">
        <h1 id="secretAdminTrigger" ondblclick="makeMeHost()">LOBBY</h1>
        
        <div class="access-section">
            <input type="password" id="accessCode" class="code-input" placeholder="ENTER ACCESS CODE" maxlength="4" oninput="checkCode()">
        </div>

        <div class="player-list" id="playerList"></div>

        <button id="mainBtn" class="btn" onclick="handleMainBtn()">LOCKED</button>
        
        <p style="font-size: 11px; color: #333; margin-top: 15px;">SECURE CHANNEL 9901</p>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDCRXJY0Ve5YZIXOOnTVIwU9T1zpCSX-Cs",
        authDomain: "game-745d3.firebaseapp.com",
        databaseURL: "https://game-745d3-default-rtdb.firebaseio.com",
        projectId: "game-745d3",
        storageBucket: "game-745d3.firebasestorage.app",
        messagingSenderId: "907334488624",
        appId: "1:907334488624:web:efb34e82fa22c1fbb313f5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const SECRET_CODE = "9901";
    const ROOM_ID = "ROOM_9901"; 
    const myId = "user_" + Math.floor(Math.random() * 1000000);
    const myName = localStorage.getItem('playerName') || "AGENT_" + myId.slice(-3);

    let isUnlocked = false;
    let iamHost = false; // هل أنا الهوست الحالي؟
    let currentPlayers = [];

    const roomRef = db.ref(`rooms/${ROOM_ID}`);
    const myPlayerRef = db.ref(`rooms/${ROOM_ID}/players/${myId}`);

    function checkCode() {
        const val = document.getElementById('accessCode').value;
        if (val === SECRET_CODE) {
            isUnlocked = true;
            document.getElementById('playerList').classList.add('active');
            myPlayerRef.set({ name: myName, ready: false, id: myId });
            myPlayerRef.onDisconnect().remove();
        } else {
            isUnlocked = false;
            document.getElementById('playerList').classList.remove('active');
            myPlayerRef.remove();
        }
    }

    // الدالة السحرية
    function makeMeHost() {
        if (!isUnlocked) return;
        // نبعث للـ Firebase إن الـ hostId هو أنا
        roomRef.update({ hostId: myId });
    }

    roomRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // التحقق لو تم طردي
        if (isUnlocked && data.players && !data.players[myId]) {
            location.reload(); 
        }

        // التحقق من الهوست
        iamHost = (data.hostId === myId);

        // التحقق من بداية اللعبة
        if (data.gameStarted) {
            window.location.href = "infiltrator_hq.html";
        }

        const playersObj = data.players || {};
        currentPlayers = Object.keys(playersObj).map(id => playersObj[id]);
        
        render(data.hostId);
    });

    function render(currentHostId) {
        const list = document.getElementById('playerList');
        if (!list || !isUnlocked) return;
        
        list.innerHTML = '';
        currentPlayers.forEach(p => {
            const isThisPlayerHost = (p.id === currentHostId);
            list.innerHTML += `
                <div class="player-item" style="border-color: ${p.ready ? 'var(--neon)' : '#222'}">
                    <span>
                        ${isThisPlayerHost ? '<span class="host-mark">★</span>' : ''}
                        ${p.name} ${p.id === myId ? '(أنت)' : ''}
                    </span>
                    <div style="display:flex; align-items:center;">
                        ${iamHost && p.id !== myId ? `<button class="kick-btn" onclick="kick('${p.id}')">KICK</button>` : ''}
                        <span class="status-badge ${p.ready ? 'bg-ready' : 'bg-not'}">${p.ready ? 'READY' : 'WAIT'}</span>
                    </div>
                </div>`;
        });

        updateButtonUI();
    }

    function updateButtonUI() {
        const mainBtn = document.getElementById('mainBtn');
        const me = currentPlayers.find(p => p.id === myId);
        if (!me) return;

        const allReady = currentPlayers.length >= 2 && currentPlayers.every(p => p.ready);

        mainBtn.classList.add('unlocked');
        
        if (iamHost) {
            if (allReady) {
                mainBtn.innerText = "START MISSION";
                mainBtn.classList.add('is-start');
            } else {
                mainBtn.innerText = "WAITING FOR AGENTS...";
                mainBtn.classList.remove('is-start');
            }
        } else {
            mainBtn.innerText = me.ready ? "READY SENT" : "READY FOR MISSION";
            mainBtn.classList.toggle('is-start', me.ready);
        }
    }

    function handleMainBtn() {
        if (!isUnlocked) return;
        const me = currentPlayers.find(p => p.id === myId);
        const allReady = currentPlayers.length >= 2 && currentPlayers.every(p => p.ready);

        if (iamHost && allReady) {
            roomRef.update({ gameStarted: true });
        } else if (!iamHost) {
            myPlayerRef.update({ ready: !me.ready });
        }
    }

    function kick(id) {
        db.ref(`rooms/${ROOM_ID}/players/${id}`).remove();
    }
</script>
</body>
</html>
