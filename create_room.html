<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undercover - Mega Lobby (Host System)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d2ff; --spy: #ff0055; --bot: #00ff95; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Cairo', sans-serif; background: var(--bg); color: white; overflow: hidden; }

        /* أنيميشن الخلفية */
        .bg-animate { position: fixed; inset: 0; background: #050505; z-index: -1; }
        .bg-dots { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(var(--neon) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.05; animation: moveBg 20s linear infinite; }
        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 500px 500px; } }

        #lobbyWrapper { display: grid; grid-template-columns: 1fr 350px; height: 100vh; }

        .main-lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; }
        .players-area { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; max-width: 800px; }

        .player-slot { 
            background: rgba(255,255,255,0.02); border: 1px dashed #333;
            border-radius: 20px; height: 150px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.4s; opacity: 0.2;
            position: relative;
        }
        .player-slot.active { opacity: 1; border: 2px solid var(--neon); background: rgba(0, 210, 255, 0.05); border-style: solid; }
        
        /* علامة الهوست */
        .host-badge {
            position: absolute; top: -10px; background: var(--neon); color: #000;
            padding: 2px 12px; border-radius: 5px; font-size: 10px; font-weight: 900;
            display: none; box-shadow: 0 0 10px var(--neon); z-index: 5;
        }

        .p-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #444; background: #222 center/cover; transition: 0.3s; }
        .is-ready .p-img { border-color: var(--bot); box-shadow: 0 0 15px var(--bot); }
        
        .ready-tag { font-size: 10px; color: var(--bot); margin-top: 8px; font-weight: 900; display: none; background: rgba(0,255,149,0.1); padding: 2px 8px; border-radius: 10px; }
        .is-ready .ready-tag { display: block; }

        /* الشات */
        .lobby-chat { background: #0c0c0c; border-right: 1px solid #222; display: flex; flex-direction: column; position: relative; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .chat-in-wrapper { padding: 15px; background: #111; display: flex; gap: 8px; }
        .chat-in-wrapper input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; outline: none; }

        /* الكود العلوي */
        .code-banner { position: absolute; top: 30px; text-align: center; }
        .code-banner h2 { color: var(--neon); margin: 0; letter-spacing: 5px; font-size: 35px; text-shadow: 0 0 15px var(--neon); }
        
        /* الأزرار */
        .action-bar { margin-top: 40px; display: flex; gap: 20px; }
        .btn { padding: 15px 40px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-ready { background: #222; color: #fff; border: 1px solid #444; }
        .btn-ready.pushed { background: var(--bot); color: #000; box-shadow: 0 0 15px var(--bot); }
        
        .btn-start { 
            background: #111; color: #444; display: none; /* مخفي لغير الهوست */
            border: 1px solid #222; text-transform: uppercase;
        } 
        .btn-start.enabled { background: var(--neon); color: #000; box-shadow: 0 0 25px var(--neon); cursor: pointer; display: block; }

        @media (max-width: 768px) {
            #lobbyWrapper { grid-template-columns: 1fr; }
            .players-area { grid-template-columns: repeat(2, 1fr); }
            .lobby-chat { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="bg-animate"><div class="bg-dots"></div></div>

    <div id="lobbyWrapper">
        <div class="main-lobby">
            <div class="code-banner">
                <h2 id="roomDisplay">9901</h2>
                <p id="statusText" style="color: #666; font-size: 14px; margin-top: 10px;">بانتظار الهوست...</p>
            </div>

            <div class="players-area">
                <script>
                    for(let i=0; i<8; i++) {
                        document.write(`
                            <div class="player-slot" id="slot-${i}">
                                <div class="host-badge" id="badge-${i}">HOST</div>
                                <div class="p-img" id="img-${i}"></div>
                                <div class="p-name" id="name-${i}" style="margin-top:8px; font-weight:bold; font-size:13px;">...</div>
                                <div class="ready-tag">READY</div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="action-bar">
                <button class="btn btn-ready" id="readyBtn" onclick="toggleReady()">READY</button>
                <button class="btn btn-start" id="startBtn" onclick="masterStart()" disabled>START GAME</button>
            </div>
        </div>

        <aside class="lobby-chat">
            <div style="padding: 15px; border-bottom: 1px solid #222; color: var(--neon); font-weight: 900;">LOBBY CHAT <span id="count" style="float:left; color:#444">0/8</span></div>
            <div class="chat-msgs" id="chatBox"></div>
            <div class="chat-in-wrapper">
                <input type="text" id="chatInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter')sendMsg()">
            </div>
        </aside>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDCRXJY0Ve5YZIXOOnTVIwU9T1zpCSX-Cs",
        authDomain: "game-745d3.firebaseapp.com",
        databaseURL: "https://game-745d3-default-rtdb.firebaseio.com",
        projectId: "game-745d3",
        storageBucket: "game-745d3.firebasestorage.app",
        messagingSenderId: "907334488624",
        appId: "1:907334488624:web:efb34e82fa22c1fbb313f5"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. بياناتي الأساسية
    const ROOM_ID = "9901";
    const myId = "player_" + Math.floor(Math.random() * 1000000);
    const myName = localStorage.getItem('playerName') || "عميل مجهول";
    const myImg = localStorage.getItem('savedImg') || "";
    let amIHost = false;

    const playerRef = db.ref(`rooms/${ROOM_ID}/players/${myId}`);
    const roomRef = db.ref(`rooms/${ROOM_ID}`);

    // دخول الغرفة
    playerRef.set({ id: myId, name: myName, img: myImg, isReady: false });
    playerRef.onDisconnect().remove();

    // 3. المزامنة والتحكم (Logic)
    roomRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const players = data.players || {};
        const state = data.state || "waiting";
        const playerIds = Object.keys(players);

        // أهم جزء: لو الهوست بدأ، الكل يحول فوراً
        if (state === "started") {
            window.location.href = "play.html"; // حط هنا اسم صفحة اللعبة اللي هتدخلوا عليها
            return;
        }

        // تحديد الهوست (أول واحد دخل القائمة)
        const currentHostId = playerIds[0];
        amIHost = (currentHostId === myId);

        refreshLobbyUI(players, playerIds, currentHostId);
    });

    function refreshLobbyUI(players, playerIds, currentHostId) {
        // تصفير الأماكن
        for(let i=0; i<8; i++) {
            document.getElementById(`slot-${i}`).classList.remove('active', 'is-ready');
            document.getElementById(`badge-${i}`).style.display = "none";
            document.getElementById(`name-${i}`).innerText = "...";
            document.getElementById(`img-${i}`).style.backgroundImage = "";
        }

        let readyCount = 0;
        playerIds.forEach((id, index) => {
            if(index < 8) {
                const p = players[id];
                const slot = document.getElementById(`slot-${index}`);
                slot.classList.add('active');
                if(p.isReady) { slot.classList.add('is-ready'); readyCount++; }
                
                // إظهار علامة الهوست
                if(id === currentHostId) document.getElementById(`badge-${index}`).style.display = "block";
                
                document.getElementById(`name-${index}`).innerText = (id === myId) ? p.name + " (أنت)" : p.name;
                if(p.img) document.getElementById(`img-${index}`).style.backgroundImage = `url('${p.img}')`;
            }
        });

        document.getElementById('count').innerText = `${playerIds.length}/8`;

        // تحكم الهوست
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');

        if(amIHost) {
            startBtn.style.display = "block";
            statusText.innerText = "أنت الهوست: ابدأ اللعبة عندما يجهز الجميع";
            statusText.style.color = "var(--neon)";
            
            // الهوست يبدأ لو فيه شخصين على الأقل والكل داس Ready
            if(playerIds.length >= 2 && readyCount === playerIds.length) {
                startBtn.classList.add('enabled');
                startBtn.disabled = false;
            } else {
                startBtn.classList.remove('enabled');
                startBtn.disabled = true;
            }
        } else {
            startBtn.style.display = "none";
            statusText.innerText = "بانتظار الهوست لبدء المهمة...";
            statusText.style.color = "#666";
        }
    }

    // 4. الدوال (Actions)
    function toggleReady() {
        const btn = document.getElementById('readyBtn');
        const isCurrentlyReady = btn.classList.contains('pushed');
        playerRef.update({ isReady: !isCurrentlyReady });
        btn.classList.toggle('pushed');
        btn.innerText = isCurrentlyReady ? "READY" : "CANCEL";
    }

    function masterStart() {
        if(amIHost) {
            // الهوست بيغير حالة الغرفة لـ started وده بيسحب الكل معاه
            roomRef.update({ state: "started" });
        }
    }

    // الشات
    function sendMsg() {
        const input = document.getElementById('chatInput');
        if(input.value.trim()) {
            db.ref(`rooms/${ROOM_ID}/chat`).push({ sender: myName, msg: input.value });
            input.value = "";
        }
    }

    db.ref(`rooms/${ROOM_ID}/chat`).on('child_added', (snap) => {
        const c = snap.val();
        const box = document.getElementById('chatBox');
        box.innerHTML += `<div style="margin-bottom:8px"><b>${c.sender}:</b> ${c.msg}</div>`;
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
