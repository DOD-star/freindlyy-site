<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجلس حكايات السهرة | المايسترو زيزو 🕶️</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --dark: #05070a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.4s; }
        
        body { 
            margin: 0; background: var(--dark); height: 100vh; overflow: hidden;
            background: radial-gradient(circle at center, #101025 0%, #05070a 100%);
            display: flex; justify-content: center; align-items: center; color: white;
        }

        /* شاشة التقييم والاستراحة */
        #vote-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(15px);
        }
        #vote-overlay.show { display: flex; animation: fadeIn 0.5s forwards; }

        .game-window {
            width: 95%; max-width: 1100px; height: 85vh; background: rgba(0,0,0,0.8);
            border-radius: 30px; border: 1px solid #333; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,242,255,0.1); position: relative;
        }

        .chairs-container { display: flex; gap: 20px; justify-content: center; padding: 25px; border-bottom: 1px solid #222; flex-wrap: wrap; }
        .player-card { position: relative; width: 80px; text-align: center; }
        .avatar-frame { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #333; position: relative; margin: 0 auto; background: #111; }
        .player-card.active .avatar-frame { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); transform: scale(1.1); }
        .player-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .crown-img { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 45px; z-index: 10; }

        .chat-area { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .zi-msg { background: rgba(255, 0, 255, 0.1); border-right: 5px solid var(--pink); padding: 12px; border-radius: 10px; color: #ffccff; align-self: flex-start; max-width: 80%; }
        .user-msg { background: #1a1b26; padding: 10px; border-radius: 10px; border: 1px solid #333; align-self: flex-end; max-width: 80%; }

        .footer { padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid #222; border-radius: 0 0 30px 30px; }
        input { flex-grow: 1; background: #111; border: 1px solid #444; color: white; padding: 15px; border-radius: 15px; outline: none; }
        input:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-ready { background: #333; color: white; }
        .btn-ready.active { background: #2ecc71; color: black; box-shadow: 0 0 10px #2ecc71; }
        .btn-send { background: var(--neon); color: black; }

        .star-box { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .star-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); background: none; color: var(--gold); font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="vote-overlay">
    <h1 id="vote-info" style="color: var(--gold); text-align: center;">قيم الحكاية يا أسطورة ⭐</h1>
    <div id="cooldown-timer" style="color: white; font-size: 3rem; margin-top: 20px; display: none; font-weight: bold;">10</div>
    <div class="star-box" id="star-box"></div>
</div>

<div class="game-window">
    <header style="padding: 15px 25px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;">
        <div style="color: var(--neon); font-weight: bold;">SOHRA COUNCIL 🕶️</div>
        <div id="status-text" style="color: #666; font-size: 0.8rem;">ارغوا براحتكم.. مستني 2 جاهزين</div>
    </header>

    <div class="chairs-container" id="chairs"></div>
    <div class="chat-area" id="chat"></div>

    <div class="footer">
        <button class="btn btn-ready" id="ready-btn">READY</button>
        <input type="text" id="msg-input" placeholder="ارغي براحتك لحد ما الكل يجهز...">
        <button class="btn btn-send" id="send-btn">إرسال 🚀</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, update, onChildAdded, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCOzX_hvUiIwZ9_Z-FP_c0IBDpgHwu2N7U", 
        databaseURL: "https://mychatapp-79fff-default-rtdb.firebaseio.com" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const myName = localStorage.getItem('user_name') || "أسطورة";
    const myPhoto = localStorage.getItem('user_photo') || "https://api.dicebear.com/7.x/bottts/svg?seed=Lucky";
    const myGender = localStorage.getItem('user_gender') || "male";
    const myFrame = localStorage.getItem('user_frame') || "none";
    const roomCode = location.hash.substring(1) || "1000";

    const roomRef = ref(db, `sohra-final/${roomCode}`);
    const myPlayerRef = ref(db, `sohra-final/${roomCode}/players/${myName}`);

    // دخول المجلس وحذف اللاعب عند الخروج
    set(myPlayerRef, { name: myName, photo: myPhoto, gender: myGender, frame: myFrame, ready: false });
    onDisconnect(myPlayerRef).remove();

    onValue(roomRef, (snap) => {
        const data = snap.val(); if(!data) return;
        renderPlayers(data.players, data.turn);
        
        const input = document.getElementById('msg-input');
        const overlay = document.getElementById('vote-overlay');
        const status = document.getElementById('status-text');

        if (data.state === 'playing') {
            if (data.turn === myName) {
                input.disabled = false;
                input.placeholder = `احكي حكاية فيها كلمة: [${data.word}]`;
            } else {
                input.disabled = true;
                input.placeholder = `زيزو كتم الشات.. اسمع ${data.turn}`;
            }
            status.innerText = `الدور عند: ${data.turn}`;
        } else {
            input.disabled = false;
            input.placeholder = "ارغي براحتك لحد ما المجلس يكمل...";
            status.innerText = data.state === 'cooldown' ? "استراحة 10 ثواني" : "مستني 2 جاهزين للبدء...";
        }

        if (data.state === 'voting') {
            overlay.classList.add('show');
            renderVoting(data.turn);
        } else if (data.state === 'cooldown') {
            overlay.classList.add('show');
            document.getElementById('star-box').style.display = 'none';
        } else {
            overlay.classList.remove('show');
        }
    });

    function renderPlayers(players, turn) {
        const box = document.getElementById('chairs'); box.innerHTML = '';
        Object.keys(players || {}).forEach(p => {
            const player = players[p];
            const crown = (player.gender === 'female') ? "https://cdn-icons-png.flaticon.com/512/3554/3554031.png" : "https://cdn-icons-png.flaticon.com/512/2353/2353351.png";
            box.innerHTML += `
                <div class="player-card ${p === turn ? 'active' : ''}">
                    <div class="avatar-frame">
                        ${player.frame === 'crown' ? `<img src="${crown}" class="crown-img">` : ''}
                        <img src="${player.photo}" class="player-pfp">
                    </div>
                    <div style="font-size:0.6rem; margin-top:5px; color:${player.ready?'#2ecc71':'#888'}">${p}</div>
                </div>`;
        });
    }

    document.getElementById('ready-btn').onclick = function() {
        const active = this.classList.toggle('active');
        update(myPlayerRef, { ready: active });
        
        // التحقق من الجاهزية للكل (على الأقل 2)
        onValue(ref(db, `sohra-final/${roomCode}/players`), (snap) => {
            const players = snap.val();
            const keys = Object.keys(players || {});
            const readyCount = Object.values(players || {}).filter(p => p.ready).length;
            
            if(readyCount >= 2 && readyCount === keys.length) {
                const firstPlayer = keys[Math.floor(Math.random() * keys.length)];
                update(roomRef, { state: 'playing', turn: firstPlayer, word: "عسل" });
                push(ref(db, `sohra-final/${roomCode}/chat`), { user: "زيزو الشقي 🕶️", msg: `المجلس اكتمل! دور ${firstPlayer} بدأ.. الكلمة: "عسل". الشات اتقفل!`, type: "zi" });
            }
        }, { onlyOnce: true });
    };

    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('msg-input');
        if(input.value.trim()) {
            push(ref(db, `sohra-final/${roomCode}/chat`), { user: myName, msg: input.value });
            
            onValue(roomRef, (snap) => {
                const data = snap.val();
                if(data.state === 'playing' && data.turn === myName) {
                    update(roomRef, { state: 'voting' });
                    push(ref(db, `sohra-final/${roomCode}/chat`), { user: "زيزو الشقي 🕶️", msg: `عاش يا ${myName}! قيموه يا وحوش..`, type: "zi" });
                }
            }, { onlyOnce: true });
            input.value = '';
        }
    };

    function renderVoting(target) {
        const box = document.getElementById('star-box'); box.innerHTML = '';
        document.getElementById('cooldown-timer').style.display = 'none';
        document.getElementById('vote-info').innerText = (myName === target) ? "المجلس بيقيمك يا وحش.." : `قيم حكاية ${target} من 10 ⭐`;
        
        for(let i=1; i<=10; i++) {
            box.innerHTML += `<button class="star-btn" onclick="startCooldown()">${i}</button>`;
        }
    }

    window.startCooldown = () => {
        update(roomRef, { state: 'cooldown' });
        const timerText = document.getElementById('cooldown-timer');
        const info = document.getElementById('vote-info');
        timerText.style.display = 'block';
        info.innerText = "استراحة 10 ثواني.. زيزو بيجهز الدور الجاي";
        
        let timeLeft = 10;
        timerText.innerText = timeLeft;
        
        const interval = setInterval(() => {
            timeLeft--;
            timerText.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(interval);
                update(roomRef, { state: 'waiting', turn: "" });
                // إعادة تصفير الجاهزية للبدء من جديد
                update(myPlayerRef, { ready: false });
                document.getElementById('ready-btn').classList.remove('active');
            }
        }, 1000);
    };

    onChildAdded(ref(db, `sohra-final/${roomCode}/chat`), (snap) => {
        const d = snap.val();
        document.getElementById('chat').innerHTML += `<div class="${d.type==='zi'?'zi-msg':'user-msg'}"><b>${d.user}:</b> ${d.msg}</div>`;
        document.getElementById('chat').scrollTop = 9999;
    });
</script>
</body>
</html>
