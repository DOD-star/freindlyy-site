<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHRA COUNCIL | مجلس زيزو 🕶️</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --dark: #05070a; --ready-color: #2ecc71; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma; }
        body { margin: 0; background: var(--dark); height: 100vh; overflow: hidden; color: white; display: flex; flex-direction: column; }

        .main-header { padding: 15px 25px; background: #0a0a14; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }

        .chairs-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .player-card { position: relative; width: 90px; text-align: center; transition: 0.3s; }
        
        /* التعديل: الأخضر للجاهزية */
        .avatar-frame { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #333; position: relative; background: #111; margin: 0 auto; }
        .player-card.is-ready .avatar-frame { border-color: var(--ready-color) !important; box-shadow: 0 0 15px var(--ready-color); }
        .player-card.is-ready .p-name { color: var(--ready-color) !important; font-weight: bold; }

        .player-card.active .avatar-frame { border-color: var(--neon); box-shadow: 0 0 25px var(--neon); transform: scale(1.1); }
        .p-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .timer-bubble { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: #ff3333; color: white; padding: 2px 8px; border-radius: 8px; font-weight: bold; font-size: 0.7rem; }

        .chat-area { flex: 1; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; border-right: 1px solid #222; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; background: #1a1a2e; border-right: 3px solid transparent; }
        .zi-msg { border-right-color: var(--pink); background: rgba(255, 0, 255, 0.05); color: #ffccff; }

        .footer { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        
        .btn-ready { background: #222; color: white; border: 1px solid #444; padding: 0 20px; border-radius: 10px; cursor: pointer; }
        .btn-ready.active { background: var(--ready-color); color: black; border-color: var(--ready-color); }

        #vote-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #vote-overlay.show { display: flex; }
        .star-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); background: none; color: var(--gold); font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div id="vote-overlay">
    <div id="winner-ui" style="display:none; text-align:center;">
        <h1 id="win-name" style="font-size: 3rem; color: var(--neon);"></h1>
        <h2 style="color: var(--gold);">👑 حكواتي السهرة 👑</h2>
    </div>
    <div id="vote-ui" style="text-align:center;">
        <h2 id="vote-info" style="color: var(--gold);">زيزو مستني التقييم ⭐</h2>
        <div id="stars"></div>
    </div>
    <div id="cd-timer" style="color:white; font-size:2rem; margin-top:20px;"></div>
</div>

<header class="main-header">
    <div style="display:flex; align-items:center; gap:10px;">
        <img id="u-pfp" src="" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--neon);">
        <span id="u-name"></span>
    </div>
    <div style="color: var(--pink); font-weight: bold; letter-spacing: 1px;">مجلس زيزو الشقي 🕶️</div>
</header>

<div style="display:flex; flex:1; overflow:hidden;">
    <div style="flex:2; display:flex; flex-direction:column; align-items:center; border-left:1px solid #222;">
        <div class="chairs-grid" id="chairs"></div>
        <div id="word-box" style="display:none; padding:15px; border:2px dashed var(--gold); border-radius:15px;">
            زيزو بيقولك الكلمة: <b id="target-word" style="font-size:2rem; color:var(--gold);"></b>
        </div>
    </div>

    <div class="chat-area">
        <div id="chat-msgs"></div>
        <div class="footer">
            <button class="btn-ready" id="ready-btn">READY</button>
            <input type="text" id="msg-in" placeholder="اسمع كلام زيزو...">
            <button onclick="sendMsg()" style="background:var(--neon); border:none; padding:10px 15px; border-radius:10px; cursor:pointer;">🚀</button>
        </div>
    </div>
</div>

<script>
    // --- الربط (استخدم بياناتك) ---
    const firebaseConfig = { apiKey: "YOUR_API_KEY", databaseURL: "https://YOUR_PROJECT.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const user = {
        name: localStorage.getItem('user_name') || "أسطورة",
        photo: localStorage.getItem('user_photo') || "https://api.dicebear.com/7.x/avataaars/svg?seed=1"
    };

    const roomRef = db.ref('sohra_council/room_1');
    const myRef = roomRef.child('players').child(user.name);

    document.getElementById('u-name').innerText = user.name;
    document.getElementById('u-pfp').src = user.photo;

    myRef.set({ ...user, ready: false, score: 0 });
    myRef.onDisconnect().remove();

    // دالة زيزو العصبي
    function zizoSay(text) {
        roomRef.child('chat').push({ u: "زيزو الشقي 🕶️", m: text, type: "zi" });
    }

    roomRef.on('value', (snap) => {
        const data = snap.val(); if(!data) return;
        renderPlayers(data.players, data.turn, data.timeLeft);
        
        const overlay = document.getElementById('vote-overlay');
        if(data.state === 'voting') {
            overlay.classList.add('show');
            document.getElementById('vote-ui').style.display = 'block';
            document.getElementById('winner-ui').style.display = 'none';
            renderStars(data.turn);
        } else if(data.state === 'cooldown') {
            overlay.classList.add('show');
            document.getElementById('vote-ui').style.display = 'none';
            document.getElementById('winner-ui').style.display = 'block';
            showWinner(data.players);
        } else {
            overlay.classList.remove('show');
        }

        if(data.state === 'playing') {
            document.getElementById('word-box').style.display = 'block';
            document.getElementById('target-word').innerText = data.word;
        } else {
            document.getElementById('word-box').style.display = 'none';
        }
    });

    function renderPlayers(players, turn, timeLeft) {
        const box = document.getElementById('chairs'); box.innerHTML = '';
        Object.keys(players || {}).forEach(p => {
            const player = players[p];
            const isReady = player.ready;
            const isTurn = (p === turn);
            box.innerHTML += `
                <div class="player-card ${isReady ? 'is-ready' : ''} ${isTurn ? 'active' : ''}">
                    ${isTurn ? `<div class="timer-bubble">${timeLeft}s</div>` : ''}
                    <div class="avatar-frame"><img src="${player.photo}" class="p-pfp"></div>
                    <div class="p-name" style="font-size:0.75rem; margin-top:5px; color:#aaa;">${p}</div>
                </div>`;
        });
    }

    document.getElementById('ready-btn').onclick = function() {
        const r = this.classList.toggle('active');
        myRef.update({ ready: r });
        if(r) zizoSay("ايوه كده يا " + user.name + " اجهز بدل ما اكرشك!");
    };

    let timer;
    roomRef.child('turn').on('value', (snap) => {
        clearInterval(timer);
        if(snap.val() === user.name) {
            let t = 300;
            timer = setInterval(() => {
                t--; roomRef.update({ timeLeft: t });
                if(t === 100) zizoSay("اخلص يا " + user.name + " صدعتنا.. فاضل 100 ثانية!");
                if(t <= 0) { clearInterval(timer); sendMsg(); }
            }, 1000);
        }
    });

    function sendMsg() {
        const inp = document.getElementById('msg-in');
        if(inp.value.length < 3) {
            zizoSay("تؤتؤتؤ.. انت نوتي يا " + user.name + " بطل استظراف واكتب حكاية!");
            return;
        }
        clearInterval(timer);
        roomRef.child('chat').push({ u: user.name, m: inp.value });
        roomRef.update({ state: 'voting', timeLeft: 300 });
        inp.value = '';
    }

    function renderStars(target) {
        const box = document.getElementById('stars'); box.innerHTML = '';
        if(user.name !== target) {
            document.getElementById('vote-info').innerText = "قيم حكاية " + target + " بسرعة!";
            for(let i=1; i<=10; i++) box.innerHTML += `<button class="star-btn" onclick="vote('${target}', ${i})">${i}</button>`;
        } else {
            document.getElementById('vote-info').innerText = "المجلس بيقيمك.. ادعي زيزو يرضى عنك!";
        }
    }

    window.vote = (t, s) => {
        db.ref(`sohra_council/room_1/players/${t}/score`).transaction(v => (v||0) + s);
        roomRef.update({ state: 'cooldown' });
    };

    function showWinner(players) {
        let top = { n: "محدش", s: -1 };
        Object.keys(players).forEach(p => { if(players[p].score > top.s) top = { n:p, s:players[p].score }; });
        document.getElementById('win-name').innerText = top.n;
        let c = 10;
        const iv = setInterval(() => {
            c--; document.getElementById('cd-timer').innerText = "الدور الجاي في " + c;
            if(c <= 0) {
                clearInterval(iv);
                roomRef.update({ state: 'waiting', turn: "", timeLeft: 300 });
                myRef.update({ ready: false });
                document.getElementById('ready-btn').classList.remove('active');
                zizoSay("متبدأ يبني انت وهو.. زيزو مستني الجاهزين!");
            }
        }, 1000);
    }

    roomRef.child('chat').on('child_added', (snap) => {
        const d = snap.val();
        const box = document.getElementById('chat-msgs');
        box.innerHTML += `<div class="msg ${d.type==='zi'?'zi-msg':''}"><b>${d.u}:</b> ${d.m}</div>`;
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
