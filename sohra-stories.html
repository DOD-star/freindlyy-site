<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHRA | مجلس الحكايات الملكي 🕶️</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --dark: #05070a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma; transition: 0.3s; }
        
        body { margin: 0; background: var(--dark); height: 100vh; overflow: hidden; color: white; display: flex; flex-direction: column; }

        /* الهيدر الموحد */
        .main-header { 
            padding: 15px 25px; background: rgba(10, 10, 20, 0.9); 
            border-bottom: 2px solid var(--neon); display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }

        .user-pill { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 50px; border: 1px solid #333; }
        .player-title { font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; background: var(--neon); color: #000; font-weight: bold; box-shadow: 0 0 10px var(--neon); }

        /* شاشة التتويج والتقييم */
        #vote-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(15px);
        }
        #vote-overlay.show { display: flex; animation: fadeIn 0.5s forwards; }

        /* منطقة المجلس */
        .game-layout { display: flex; flex: 1; overflow: hidden; }
        .council-area { flex: 2; display: flex; flex-direction: column; align-items: center; padding: 20px; border-left: 1px solid #222; position: relative; }
        
        .chairs-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; }
        .player-card { position: relative; width: 90px; text-align: center; }
        .avatar-frame { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #333; position: relative; background: #111; margin: 0 auto; }
        .player-card.active .avatar-frame { border-color: var(--neon); box-shadow: 0 0 25px var(--neon); transform: scale(1.1); }
        .player-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .crown-icon { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 45px; z-index: 10; }
        .timer-bubble { position: absolute; top: -35px; background: #ff3333; color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; }

        /* الشات */
        .chat-area { flex: 1; background: rgba(10,10,15,0.9); display: flex; flex-direction: column; min-width: 350px; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); font-size: 0.9rem; border-right: 3px solid var(--pink); }
        .msg.zi { border-right-color: var(--neon); background: rgba(0,242,255,0.05); color: var(--neon); font-weight: bold; text-align: center; }

        .footer { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-ready { background: #333; color: white; }
        .btn-ready.active { background: #2ecc71; color: black; box-shadow: 0 0 15px #2ecc71; }
        .btn-send { background: var(--neon); color: black; }

        .star-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); background: none; color: var(--gold); font-weight: bold; cursor: pointer; margin: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes winnerAnim { from { transform: scale(0.9); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="vote-overlay">
    <div id="winner-display" style="text-align: center; display: none;">
        <div style="animation: winnerAnim 0.6s infinite alternate;">
            <img id="winner-crown" src="" width="100"><br>
            <h1 id="winner-name" style="font-size: 3rem; color: var(--neon); margin: 10px 0;"></h1>
            <h2 style="color: var(--gold);">👑 حكواتي السهرة 👑</h2>
            <p id="winner-score" style="font-size: 1.2rem;"></p>
        </div>
    </div>

    <div id="voting-box" style="text-align: center;">
        <h1 id="vote-info" style="color: var(--gold);">قيم حكاية الأسطورة ⭐</h1>
        <div id="star-container" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;"></div>
    </div>
    
    <div id="cooldown-text" style="color: white; font-size: 2rem; margin-top: 30px; font-weight: bold;"></div>
</div>

<header class="main-header">
    <div class="user-pill">
        <img id="u-pfp" src="" style="width: 35px; height: 35px; border-radius: 50%;">
        <div>
            <span id="u-name" style="font-weight: bold; font-size: 0.8rem;">إياد</span>
            <span id="u-badge" class="player-title" style="display:none;">LEGEND</span>
        </div>
    </div>
    <div style="color: var(--pink); font-weight: 900; letter-spacing: 2px;">SOHRA COUNCIL</div>
    <div id="status-text" style="color: #666; font-size: 0.7rem;">مستني الأساطير تجهز...</div>
</header>

<div class="game-layout">
    <div class="council-area">
        <div class="chairs-grid" id="chairs"></div>
        <div id="current-word-box" style="display:none; background:rgba(255,215,0,0.1); padding:10px 30px; border-radius:15px; border:1px solid var(--gold);">
            <span style="color:var(--gold)">الكلمة المطلوبة: </span>
            <b id="active-word" style="font-size:1.5rem;">عسل</b>
        </div>
    </div>

    <div class="chat-area">
        <div id="chat-msgs"></div>
        <div class="footer">
            <button class="btn btn-ready" id="ready-btn">READY</button>
            <input type="text" id="msg-input" placeholder="ارغي براحتك لحد ما الكل يجهز...">
            <button class="btn btn-send" id="send-btn">🚀</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase (استخدم بياناتك الحقيقية هنا)
    const firebaseConfig = { 
        apiKey: "YOUR_API_KEY", 
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // بيانات اللاعب من LocalStorage
    const user = {
        name: localStorage.getItem('user_name') || "أسطورة",
        photo: localStorage.getItem('user_photo') || "https://api.dicebear.com/7.x/avataaars/svg?seed=1",
        gender: localStorage.getItem('user_gender') || "male",
        title: localStorage.getItem('user_title') || ""
    };

    const roomID = "1000"; // كود الغرفة الموحد
    const roomRef = db.ref(`sohra-council/${roomID}`);
    const myPlayerRef = db.ref(`sohra-council/${roomID}/players/${user.name}`);

    // دخول المجلس
    myPlayerRef.set({ ...user, ready: false, score: 0 });
    myPlayerRef.onDisconnect().remove();

    // تحديث الهيدر
    document.getElementById('u-name').innerText = user.name;
    document.getElementById('u-pfp').src = user.photo;
    if(user.title) {
        document.getElementById('u-badge').innerText = user.title;
        document.getElementById('u-badge').style.display = 'inline-block';
    }

    // مراقبة الغرفة أونلاين
    roomRef.on('value', (snap) => {
        const data = snap.val(); if(!data) return;
        renderPlayers(data.players, data.turn, data.timeLeft);
        
        const input = document.getElementById('msg-input');
        const overlay = document.getElementById('vote-overlay');

        if (data.state === 'playing') {
            document.getElementById('current-word-box').style.display = 'block';
            document.getElementById('active-word').innerText = data.word;
            if (data.turn === user.name) {
                input.disabled = false;
                input.placeholder = "احكي حكايتك.. التايمر شغال!";
            } else {
                input.disabled = true;
                input.placeholder = `اسمع حكاية ${data.turn}...`;
            }
        } else {
            document.getElementById('current-word-box').style.display = 'none';
        }

        // التحكم في الأوفرلاي (تصويت / تتويج)
        if (data.state === 'voting') {
            overlay.classList.add('show');
            document.getElementById('voting-box').style.display = 'block';
            document.getElementById('winner-display').style.display = 'none';
            renderVoting(data.turn);
        } else if (data.state === 'cooldown') {
            overlay.classList.add('show');
            document.getElementById('voting-box').style.display = 'none';
            document.getElementById('winner-display').style.display = 'block';
            showWinner(data.players);
        } else {
            overlay.classList.remove('show');
        }
    });

    function renderPlayers(players, turn, timeLeft) {
        const box = document.getElementById('chairs'); box.innerHTML = '';
        Object.keys(players || {}).forEach(p => {
            const player = players[p];
            const isTurn = (p === turn);
            const crown = (player.gender === 'female') ? "https://cdn-icons-png.flaticon.com/512/3554/3554031.png" : "https://cdn-icons-png.flaticon.com/512/2353/2353351.png";
            
            box.innerHTML += `
                <div class="player-card ${isTurn ? 'active' : ''}">
                    ${isTurn ? `<div class="timer-bubble">${timeLeft}s</div>` : ''}
                    <div class="avatar-frame">
                        <img src="${player.photo}" class="player-pfp">
                        <img src="${crown}" class="crown-icon" style="display:${isTurn?'block':'none'}">
                    </div>
                    <div style="font-size:0.7rem; margin-top:5px; color:${player.ready?'#2ecc71':'#888'}">${p}</div>
                </div>`;
        });
    }

    // نظام التايمر 300 ثانية (عند الشخص اللي عليه الدور بس)
    let localTimer;
    roomRef.child('turn').on('value', (snap) => {
        clearInterval(localTimer);
        if(snap.val() === user.name) {
            let time = 300;
            localTimer = setInterval(() => {
                time--;
                roomRef.update({ timeLeft: time });
                if(time <= 0) { clearInterval(localTimer); sendStory(); }
            }, 1000);
        }
    });

    document.getElementById('ready-btn').onclick = function() {
        const active = this.classList.toggle('active');
        myPlayerRef.update({ ready: active, score: 0 });
    };

    document.getElementById('send-btn').onclick = sendStory;

    function sendStory() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        clearInterval(localTimer); // إيقاف التايمر فوراً عند الإرسال
        
        roomRef.child('chat').push({ user: user.name, msg: input.value });
        roomRef.update({ state: 'voting' });
        input.value = '';
    }

    function renderVoting(target) {
        const box = document.getElementById('star-container'); box.innerHTML = '';
        document.getElementById('vote-info').innerText = (user.name === target) ? "المجلس يقيم حكايتك..." : `قيم حكاية ${target} من 10 ⭐`;
        
        if(user.name !== target) {
            for(let i=1; i<=10; i++) {
                box.innerHTML += `<button class="star-btn" onclick="submitVote('${target}', ${i})">${i}</button>`;
            }
        }
    }

    window.submitVote = (target, stars) => {
        db.ref(`sohra-council/${roomID}/players/${target}/score`).transaction(s => (s || 0) + stars);
        roomRef.update({ state: 'cooldown' });
    };

    function showWinner(players) {
        let winnerName = "", maxScore = -1;
        Object.keys(players).forEach(p => {
            if(players[p].score > maxScore) { maxScore = players[p].score; winnerName = p; }
        });

        const winner = players[winnerName];
        document.getElementById('winner-name').innerText = winnerName;
        document.getElementById('winner-score').innerText = `حصل على ${maxScore} نجمة ⭐`;
        document.getElementById('winner-crown').src = (winner.gender === 'female') ? "https://cdn-icons-png.flaticon.com/512/3554/3554031.png" : "https://cdn-icons-png.flaticon.com/512/2353/2353351.png";

        let cooldown = 10;
        const cdText = document.getElementById('cooldown-text');
        const interval = setInterval(() => {
            cooldown--;
            cdText.innerText = `الدور القادم خلال ${cooldown}...`;
            if(cooldown <= 0) {
                clearInterval(interval);
                roomRef.update({ state: 'waiting', turn: "", timeLeft: 300 });
                myPlayerRef.update({ ready: false });
                document.getElementById('ready-btn').classList.remove('active');
            }
        }, 1000);
    }

    // الشات
    roomRef.child('chat').limitToLast(20).on('child_added', (snap) => {
        const d = snap.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = "msg";
        msgDiv.innerHTML = `<b>${d.user}:</b> ${d.msg}`;
        document.getElementById('chat-msgs').appendChild(msgDiv);
        document.getElementById('chat-msgs').scrollTop = 9999;
    });
</script>

</body>
</html>
