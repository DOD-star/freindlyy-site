<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHRA COUNCIL | مجلس زيزو 🕶️</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --neon: #00f2ff; 
            --pink: #ff00ff; 
            --gold: #ffd700; 
            --dark: #0b0e14; 
            --ready: #2ecc71; 
            --card-bg: #161b22; 
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: var(--dark); 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 242, 255, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(255, 0, 255, 0.05), transparent);
        }

        /* --- نيون أونلاين (الديزاين اللي طلبته) --- */
        .online-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(46, 204, 113, 0.1);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid var(--ready);
        }
        .dot {
            width: 8px;
            height: 8px;
            background: var(--ready);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--ready);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }

        /* Header */
        .top-bar { 
            padding: 15px 25px; 
            background: rgba(11, 14, 20, 0.8); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid #222; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(to right, var(--neon), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Main Layout */
        .game-layout { flex: 1; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }

        /* Players Side */
        .players-side { background: rgba(0,0,0,0.2); border-left: 1px solid #222; padding: 20px; overflow-y: auto; }
        .chairs-grid { display: flex; flex-direction: column; gap: 15px; }
        
        .p-card { 
            background: var(--card-bg); 
            padding: 12px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            border: 1px solid #333;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .p-card.active { border-color: var(--neon); transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .p-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #444; }
        .p-card.is-ready .p-avatar { border-color: var(--ready); }

        /* Chat Side */
        .chat-side { display: flex; flex-direction: column; position: relative; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1c2128; padding: 10px 15px; border-radius: 15px 15px 0 15px; align-self: flex-start; max-width: 80%; border: 1px solid #333; }
        .zi-msg { background: linear-gradient(45deg, #2b002b, #161b22); border-right: 3px solid var(--pink); align-self: center; color: #ffb3ff; }

        /* Controls */
        .bottom-controls { padding: 20px; background: #0b0e14; border-top: 1px solid #222; display: flex; gap: 10px; }
        .input-box { flex: 1; background: #1c2128; border-radius: 10px; border: 1px solid #333; padding: 0 15px; display: flex; }
        .input-box input { width: 100%; background: none; border: none; color: white; padding: 12px; outline: none; }
        
        .btn { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; padding: 10px 20px; }
        .btn-rdy { background: #333; color: white; }
        .btn-rdy.active { background: var(--ready); color: black; }
        .btn-send { background: var(--neon); color: black; }

        #ov { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #ov.show { display: flex; }
    </style>
</head>
<body>

<div id="ov">
    <div id="win-ui" style="text-align: center;">
        <h1 id="winner-name" style="font-size: 3rem; color: var(--neon);"></h1>
        <p style="color: var(--gold); font-size: 1.5rem;">👑 بطل السهرة 👑</p>
        <div id="cooldown" style="margin-top: 20px; color: #888;"></div>
    </div>
</div>

<div class="top-bar">
    <div class="logo">SOHRA COUNCIL 🕶️</div>
    <div class="online-status">
        <div class="dot"></div>
        <span style="font-size: 12px; font-weight: bold; color: var(--ready);">LIVE SERVER</span>
    </div>
</div>

<div class="game-layout">
    <div class="players-side">
        <h4 style="margin-bottom: 15px; color: #666; font-size: 12px;">الموجودين في المجلس</h4>
        <div class="chairs-grid" id="chairs"></div>
    </div>

    <div class="chat-side">
        <div id="chat-flow"></div>
        <div id="word-banner" style="padding: 15px; background: rgba(255, 215, 0, 0.1); border-top: 1px solid var(--gold); text-align: center;">
            <span style="color: #888; font-size: 12px;">زيزو بيقولك كمل: </span>
            <span id="the-word" style="color: var(--gold); font-weight: 900; font-size: 1.2rem;"></span>
        </div>
    </div>
</div>

<div class="bottom-controls">
    <button class="btn btn-rdy" id="rdy-btn">READY</button>
    <div class="input-box">
        <input type="text" id="chat-in" placeholder="استنى دورك..." disabled>
    </div>
    <button class="btn btn-send" onclick="sendMsg()">إرسال</button>
</div>

</body>
</html>
