<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHRA COUNCIL | مجلس زيزو 🕶️</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --dark: #080a0f; --ready: #2ecc71; --card-bg: #12151d; }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--dark); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .top-bar { padding: 15px 30px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { color: var(--pink); font-weight: 900; letter-spacing: 1px; font-size: 1.1rem; }
        .me-pill { display: flex; align-items: center; gap: 10px; background: #1a1e26; padding: 6px 15px; border-radius: 30px; border: 1px solid #333; }
        .me-pill img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon); }

        /* Main Layout */
        .game-layout { flex: 1; display: grid; grid-template-columns: 350px 1fr; overflow: hidden; }

        /* Players Side */
        .players-side { padding: 30px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid #1a1a1a; }
        .chairs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 20px; width: 100%; max-width: 600px; }
        
        .p-card { background: var(--card-bg); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid #222; transition: 0.3s; position: relative; }
        .p-avatar { width: 65px; height: 65px; border-radius: 50%; margin: 0 auto 10px; border: 2px solid #333; overflow: hidden; transition: 0.3s; }
        .p-name { font-size: 0.85rem; color: #888; font-weight: 500; }

        /* Ready & Active States */
        .p-card.is-ready { border-color: var(--ready); background: rgba(46, 204, 113, 0.05); }
        .p-card.is-ready .p-avatar { border-color: var(--ready); box-shadow: 0 0 15px var(--ready); }
        .p-card.is-ready .p-name { color: var(--ready); }

        .p-card.active { border-color: var(--neon); box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); transform: translateY(-5px); }
        .p-card.active .p-avatar { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }
        
        .turn-timer { position: absolute; top: -10px; right: -10px; background: #ff3e3e; color: white; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; }

        /* Chat Side */
        .chat-side { display: flex; flex-direction: column; background: #0b0d13; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 25px; }
        .msg { margin-bottom: 12px; max-width: 85%; padding: 10px 15px; border-radius: 12px; font-size: 0.95rem; background: #181c25; border: 1px solid #252a35; }
        .zi-msg { border-right: 4px solid var(--pink); color: #ffccff; background: rgba(255, 0, 255, 0.03); font-weight: bold; }

        /* Game Word Box */
        .word-banner { margin-top: auto; padding: 20px; text-align: center; background: rgba(255, 215, 0, 0.05); border-top: 1px solid rgba(255, 215, 0, 0.2); }
        .word-txt { color: var(--gold); font-size: 2rem; font-weight: 900; text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        /* Controls */
        .bottom-controls { padding: 20px 30px; background: #05070a; border-top: 1px solid #1a1a1a; display: flex; gap: 15px; align-items: center; }
        .input-box { flex: 1; background: #12151d; border-radius: 12px; border: 1px solid #222; display: flex; align-items: center; padding: 5px 15px; }
        .input-box input { flex: 1; background: none; border: none; color: white; padding: 10px; outline: none; }
        .input-box input:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-rdy { background: #1a1e26; color: white; border: 1px solid #333; }
        .btn-rdy.active { background: var(--ready); color: black; box-shadow: 0 0 15px var(--ready); }
        .btn-send { background: var(--neon); color: black; padding: 12px 20px; }

        /* Overlay */
        #ov { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
        #ov.show { display: flex; }
        .winner-h { font-size: 4rem; color: var(--neon); text-shadow: 0 0 30px var(--neon); margin-bottom: 10px; }
        .star-box { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .star-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); color: var(--gold); background: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="ov">
    <div id="win-ui" style="display:none; text-align:center;">
        <h1 class="winner-h" id="winner-name"></h1>
        <h2 style="color:var(--gold); letter-spacing:3px;">👑 حكواتي السهرة 👑</h2>
    </div>
    <div id="vote-ui" style="text-align:center;">
        <h2 id="vote-prompt" style="color:var(--gold); margin-bottom:20px;"></h2>
        <div class="star-box" id="stars-grid"></div>
    </div>
    <div id="cooldown" style="margin-top:30px; color:#555; font-weight:bold;"></div>
</div>

<div class="top-bar">
    <div class="me-pill">
        <img id="my-pfp" src="">
        <span id="my-name"></span>
    </div>
    <div class="logo">SOHRA COUNCIL 🕶️</div>
</div>

<div class="game-layout">
    <div class="players-side">
        <div class="chairs-grid" id="chairs"></div>
    </div>

    <div class="chat-side">
        <div id="chat-flow"></div>
        <div id="word-banner" class="word-banner" style="display:none;">
            <p style="font-size:0.8rem; color:#666; margin-bottom:5px;">زيزو بيقولك كمل الجملة دي:</p>
            <div class="word-txt" id="the-word"></div>
        </div>
    </div>
</div>

<div class="bottom-controls">
    <button class="btn btn-rdy" id="rdy-btn">READY</button>
    <div class="input-box">
        <input type="text" id="chat-in" placeholder="الشات مقفول بأمر من زيزو..." disabled>
    </div>
    <button class="btn btn-send" onclick="sendMsg()">🚀</button>
</div>

<script>
    // --- تأكد من وضع بيانات Firebase الخاصة بك هنا ---
    const config = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://your-project.firebaseio.com"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    const user = {
        name: localStorage.getItem('user_name') || "أسطورة",
        photo: localStorage.getItem('user_photo') || "https://api.dicebear.com/7.x/avataaars/svg?seed=1"
    };

    document.getElementById('my-name').innerText = user.name;
    document.getElementById('my-pfp').src = user.photo;

    const room = db.ref('sohra_v4');
    const me = room.child('players').child(user.name);

    me.set({ ...user, ready: false, score: 0 });
    me.onDisconnect().remove();

    function zizo(txt) { room.child('chat').push({ u: "زيزو الشقي 🕶️", m: txt, t: "zi" }); }

    // المراقبة الأساسية
    room.on('value', snap => {
        const data = snap.val(); if(!data) return;
        
        // تحديث الكراسي جنب بعض
        const grid = document.getElementById('chairs'); grid.innerHTML = '';
        Object.keys(data.players || {}).forEach(p => {
            const ply = data.players[p];
            grid.innerHTML += `
                <div class="p-card ${ply.ready?'is-ready':''} ${p===data.turn?'active':''}">
                    ${p===data.turn ? `<div class="turn-timer">${data.timeLeft}s</div>`:''}
                    <div class="p-avatar"><img src="${ply.photo}" style="width:100%;height:100%;object-fit:cover;"></div>
                    <div class="p-name">${p}</div>
                </div>`;
        });

        // قفل وفتح الشات (فقط لصاحب الدور)
        const input = document.getElementById('chat-in');
        if(data.turn === user.name && data.state === 'playing') {
            input.disabled = false;
            input.placeholder = "اكتب حكايتك هنا يا وحش...";
        } else {
            input.disabled = true;
            input.placeholder = "الشات مقفول بأمر من زيزو...";
        }

        // الأوفرلاي
        const ov = document.getElementById('ov');
        if(data.state === 'voting') {
            ov.classList.add('show');
            document.getElementById('vote-ui').style.display='block';
            document.getElementById('win-ui').style.display='none';
            renderStars(data.turn);
        } else if(data.state === 'cooldown') {
            ov.classList.add('show');
            document.getElementById('vote-ui').style.display='none';
            document.getElementById('win-ui').style.display='block';
            showWinner(data.players);
        } else {
            ov.classList.remove('show');
        }

        document.getElementById('word-banner').style.display = (data.state==='playing')?'block':'none';
        document.getElementById('the-word').innerText = data.word || "";
    });

    document.getElementById('rdy-btn').onclick = function() {
        const r = this.classList.toggle('active');
        me.update({ ready: r });
        if(r) zizo(`أيووه يا ${user.name} اجهز متبقاش نوتي!`);
    };

    function sendMsg() {
        const i = document.getElementById('chat-in');
        if(i.disabled) return;
        if(i.value.length < 5) { zizo(`تؤتؤتؤ.. انت نوتي يا ${user.name} كمل الجملة عدل!`); return; }
        room.child('chat').push({ u: user.name, m: i.value });
        room.update({ state: 'voting', timeLeft: 300 });
        i.value = '';
    }

    function renderStars(target) {
        const grid = document.getElementById('stars-grid'); grid.innerHTML = '';
        document.getElementById('vote-prompt').innerText = (user.name===target) ? "المجلس بيقيمك..." : "قيم حكاية " + target;
        if(user.name !== target) {
            for(let i=1; i<=10; i++) grid.innerHTML += `<button class="star-btn" onclick="vote('${target}',${i})">${i}</button>`;
        }
    }

    window.vote = (t,s) => {
        db.ref(`sohra_v4/players/${t}/score`).transaction(v => (v||0)+s);
        room.update({ state: 'cooldown' });
    };

    function showWinner(players) {
        let top = {n:"لا أحد", s:-1};
        Object.keys(players).forEach(p => { if(players[p].score > top.s) top={n:p, s:players[p].score}; });
        document.getElementById('winner-name').innerText = top.n;
        let c = 10;
        const iv = setInterval(() => {
            c--; document.getElementById('cooldown').innerText = "الجولة القادمة في " + c;
            if(c<=0) {
                clearInterval(iv);
                room.update({ state:'waiting', turn:'', word:'كان ياما كان..' });
                me.update({ ready:false, score:0 });
                document.getElementById('rdy-btn').classList.remove('active');
                zizo("متبدأ يبني انت وهو متصدعناش.. اجهزوا!");
            }
        }, 1000);
    }

    room.child('chat').limitToLast(20).on('child_added', snap => {
        const d = snap.val();
        const flow = document.getElementById('chat-flow');
        flow.innerHTML += `<div class="msg ${d.t==='zi'?'zi-msg':''}"><b>${d.u}:</b> ${d.m}</div>`;
        flow.scrollTop = flow.scrollHeight;
    });
</script>
</body>
</html>
