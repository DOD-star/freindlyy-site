<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHRA COUNCIL | مجلس الحكايات 🕶️</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --dark: #05070a; --ready: #2ecc71; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma; transition: 0.3s; }
        
        body { margin: 0; background: var(--dark); height: 100vh; overflow: hidden; color: white; display: flex; flex-direction: column; }

        .main-header { padding: 15px 25px; background: rgba(10, 10, 20, 0.9); border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .user-pill { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 50px; border: 1px solid #333; }

        /* ستايل الكروت */
        .chairs-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .player-card { position: relative; width: 90px; text-align: center; }
        .avatar-frame { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #333; position: relative; background: #111; margin: 0 auto; }
        
        /* لما اللاعب يكون جاهز (Ready) */
        .player-card.is-ready .avatar-frame { border-color: var(--ready); box-shadow: 0 0 15px var(--ready); }
        .player-card.is-ready .player-name { color: var(--ready) !important; font-weight: bold; text-shadow: 0 0 5px var(--ready); }

        /* لما يكون الدور عليه (Active) */
        .player-card.active .avatar-frame { border-color: var(--neon); box-shadow: 0 0 25px var(--neon); transform: scale(1.1); }
        
        .player-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .timer-bubble { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: #ff3333; color: white; padding: 2px 10px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; z-index: 20; }

        #vote-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(15px); }
        #vote-overlay.show { display: flex; }

        .chat-area { flex: 1; background: rgba(10,10,15,0.9); display: flex; flex-direction: column; border-right: 1px solid #222; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.05); font-size: 0.9rem; }

        .footer { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-ready { background: #333; color: white; }
        .btn-ready.active { background: var(--ready); color: black; box-shadow: 0 0 15px var(--ready); }
        .btn-send { background: var(--neon); color: black; }

        .star-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); background: none; color: var(--gold); font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div id="vote-overlay">
    <div id="winner-display" style="text-align: center; display: none;">
        <h1 id="winner-name" style="font-size: 3rem; color: var(--neon);"></h1>
        <h2 style="color: var(--gold);">👑 حكواتي السهرة 👑</h2>
        <p id="cooldown-text"></p>
    </div>
    <div id="voting-box" style="text-align: center;">
        <h2 id="vote-info" style="color: var(--gold);">قيم الحكاية ⭐</h2>
        <div id="star-container"></div>
    </div>
</div>

<header class="main-header">
    <div class="user-pill">
        <img id="u-pfp" src="" style="width: 35px; height: 35px; border-radius: 50%;">
        <span id="u-name"></span>
    </div>
    <div style="color: var(--pink); font-weight: bold;">SOHRA COUNCIL</div>
    <div id="status-text">مستني الجاهزين...</div>
</header>

<div style="display: flex; flex: 1; overflow: hidden;">
    <div style="flex: 2; display: flex; flex-direction: column; align-items: center;">
        <div class="chairs-grid" id="chairs"></div>
        <div id="word-box" style="display:none; padding: 20px; border: 1px solid var(--gold); border-radius: 15px; background: rgba(255,215,0,0.1);">
            الكلمة: <b id="active-word" style="font-size: 2rem; color: var(--gold);"></b>
        </div>
    </div>

    <div class="chat-area">
        <div id="chat-msgs"></div>
        <div class="footer">
            <button class="btn btn-ready" id="ready-btn">READY</button>
            <input type="text" id="msg-input" placeholder="انتظر بدء الدور...">
            <button class="btn btn-send" id="send-btn">🚀</button>
        </div>
    </div>
</div>

<script>
    // --- الربط بفايربيز ---
    const firebaseConfig = { apiKey: "YOUR_API_KEY", databaseURL: "https://YOUR_PROJECT.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const user = {
        name: localStorage.getItem('user_name') || "لاعب",
        photo: localStorage.getItem('user_photo') || "https://api.dicebear.com/7.x/avataaars/svg?seed=1",
        gender: localStorage.getItem('user_gender') || "male"
    };

    const roomRef = db.ref(`sohra-council/1000`);
    const myRef = roomRef.child('players').child(user.name);

    myRef.set({ ...user, ready: false, score: 0 });
    myRef.onDisconnect().remove();

    document.getElementById('u-name').innerText = user.name;
    document.getElementById('u-pfp').src = user.photo;

    // --- تحديث الواجهة ---
    roomRef.on('value', (snap) => {
        const data = snap.val(); if(!data) return;
        renderPlayers(data.players, data.turn, data.timeLeft);
        
        const overlay = document.getElementById('vote-overlay');
        if(data.state === 'voting') {
            overlay.classList.add('show');
            document.getElementById('voting-box').style.display = 'block';
            document.getElementById('winner-display').style.display = 'none';
            renderStars(data.turn);
        } else if(data.state === 'cooldown') {
            overlay.classList.add('show');
            document.getElementById('voting-box').style.display = 'none';
            document.getElementById('winner-display').style.display = 'block';
            showWinner(data.players);
        } else {
            overlay.classList.remove('show');
        }

        if(data.state === 'playing') {
            document.getElementById('word-box').style.display = 'block';
            document.getElementById('active-word').innerText = data.word;
        } else {
            document.getElementById('word-box').style.display = 'none';
        }
    });

    function renderPlayers(players, turn, timeLeft) {
        const box = document.getElementById('chairs'); box.innerHTML = '';
        Object.keys(players || {}).forEach(p => {
            const player = players[p];
            const isTurn = (p === turn);
            const isReady = player.ready;
            
            box.innerHTML += `
                <div class="player-card ${isTurn ? 'active' : ''} ${isReady ? 'is-ready' : ''}">
                    ${isTurn ? `<div class="timer-bubble">${timeLeft}s</div>` : ''}
                    <div class="avatar-frame">
                        <img src="${player.photo}" class="player-pfp">
                    </div>
                    <div class="player-name" style="font-size:0.8rem; margin-top:8px; color:#aaa;">${p}</div>
                </div>`;
        });
    }

    // --- زر الجاهزية ---
    document.getElementById('ready-btn').onclick = function() {
        const isNowReady = this.classList.toggle('active');
        myRef.update({ ready: isNowReady });
    };

    // --- نظام التايمر 300 ثانية ---
    let timerInterval;
    roomRef.child('turn').on('value', (snap) => {
        clearInterval(timerInterval);
        if(snap.val() === user.name) {
            let t = 300;
            timerInterval = setInterval(() => {
                t--;
                roomRef.update({ timeLeft: t });
                if(t <= 0) { clearInterval(timerInterval); sendMsg(); }
            }, 1000);
        }
    });

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        clearInterval(timerInterval);
        roomRef.child('chat').push({ u: user.name, m: inp.value });
        roomRef.update({ state: 'voting', timeLeft: 300 });
        inp.value = '';
    }

    document.getElementById('send-btn').onclick = sendMsg;

    function renderStars(target) {
        const box = document.getElementById('star-container'); box.innerHTML = '';
        if(user.name === target) {
            document.getElementById('vote-info').innerText = "المجلس يقيمك حالياً...";
        } else {
            document.getElementById('vote-info').innerText = `قيم حكاية ${target}`;
            for(let i=1; i<=10; i++) {
                box.innerHTML += `<button class="star-btn" onclick="vote('${target}', ${i})">${i}</button>`;
            }
        }
    }

    window.vote = (t, s) => {
        db.ref(`sohra-council/1000/players/${t}/score`).transaction(v => (v||0) + s);
        roomRef.update({ state: 'cooldown' });
    };

    function showWinner(players) {
        let top = { n: "", s: -1 };
        Object.keys(players).forEach(p => { if(players[p].score > top.s) top = { n:p, s:players[p].score }; });
        document.getElementById('winner-name').innerText = top.n;
        
        let c = 10;
        const iv = setInterval(() => {
            c--;
            document.getElementById('cooldown-text').innerText = `الدور الجاي خلال ${c}...`;
            if(c <= 0) {
                clearInterval(iv);
                roomRef.update({ state: 'waiting', turn: "", timeLeft: 300 });
                myRef.update({ ready: false });
                document.getElementById('ready-btn').classList.remove('active');
            }
        }, 1000);
    }

    roomRef.child('chat').limitToLast(15).on('child_added', (snap) => {
        const d = snap.val();
        document.getElementById('chat-msgs').innerHTML += `<div class="msg"><b>${d.u}:</b> ${d.m}</div>`;
        document.getElementById('chat-msgs').scrollTop = 9999;
    });
</script>
</body>
</html>
