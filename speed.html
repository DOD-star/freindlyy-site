<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خمن الفيلم - القائمة الرئيسية</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* شاشة التحميل */
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            z-index: 1000;
            transition: opacity 1s ease-in-out;
        }

        .loader-img {
            position: absolute;
            max-width: 80%;
            max-height: 60%;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-img.active {
            opacity: 1;
            transform: scale(1);
        }

        /* بار التحميل */
        .progress-container {
            position: absolute;
            bottom: 15%;
            width: 250px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            transition: width 0.5s;
        }

        /* القائمة الرئيسية */
        #main-menu {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            display: none; /* مخفي في البداية */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 60px 40px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            color: #fff;
            font-size: 3.5rem;
            margin-bottom: 50px;
            letter-spacing: 2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .create-btn {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3);
        }

        .join-btn {
            background: linear-gradient(45deg, #3498db, #2980b9);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="load1.jpg" class="loader-img active" alt="Loading">
        <img src="load2.jpg" class="loader-img" alt="Loading">
        <img src="load3.jpg" class="loader-img" alt="Loading">
        
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
    </div>

    <div id="main-menu">
        <div class="menu-card">
            <h1>🎬 خمن الفيلم</h1>
            <div class="btn-group">
                <button class="btn create-btn" onclick="goTo('create.html')">إنشاء غرفة</button>
                <button class="btn join-btn" onclick="goTo('join.html')">دخول غرفة</button>
            </div>
        </div>
    </div>

    <script>
        const images = document.querySelectorAll('.loader-img');
        const bar = document.getElementById('bar');
        let currentIdx = 0;

        function runLoader() {
            if (currentIdx < images.length) {
                // تفعيل الصورة الحالية
                images.forEach(img => img.classList.remove('active'));
                images[currentIdx].classList.add('active');

                // تحديث البار
                let progress = ((currentIdx + 1) / images.length) * 100;
                bar.style.width = progress + '%';

                currentIdx++;
                setTimeout(runLoader, 2500); // 2.5 ثانية لكل صورة
            } else {
                finishLoading();
            }
        }

        function finishLoading() {
            const loader = document.getElementById('loading-screen');
            const menu = document.getElementById('main-menu');

            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                menu.style.display = 'flex';
                setTimeout(() => { menu.style.opacity = '1'; }, 50);
            }, 1000);
        }

        function goTo(page) {
            // تأثير خروج بسيط قبل الانتقال
            document.getElementById('main-menu').style.opacity = '0';
            setTimeout(() => {
                window.location.href = page;
            }, 500);
        }

        window.onload = () => {
            setTimeout(runLoader, 500);
        };
    </script>
</body>
</html>
