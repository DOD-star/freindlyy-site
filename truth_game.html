<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Truth or Dare - Pro Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --neon: #00d2ff; --spy: #ff0055; --bot: #00ff95; --bg: #080808; }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            font-family: 'Cairo', sans-serif; background: var(--bg); 
            color: white; overflow-y: auto; scroll-behavior: smooth;
        }

        #joinScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        .join-box {
            background: #111; padding: 45px; border-radius: 30px; 
            border: 1px solid var(--bot); text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 149, 0.1); width: 350px;
        }
        .join-box h1 { color: var(--bot); font-weight: 900; margin-bottom: 30px; }
        .join-box input {
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px;
            border: 1px solid #333; background: #000; color: white; 
            text-align: center; font-size: 16px; outline: none; box-sizing: border-box;
        }

        #gameScreen { display: none; grid-template-columns: 280px 1fr 320px; min-height: 100vh; }

        .side-panel { background: #0c0c0c; border-left: 1px solid #222; padding: 20px; overflow-y: auto; max-height: 100vh; }
        .player-card { 
            padding: 15px; border-radius: 12px; background: #151515; margin-bottom: 12px;
            border: 1px solid #222; display: flex; align-items: center; gap: 12px; 
        }
        .player-card.active { border-color: var(--bot); box-shadow: 0 0 15px rgba(0, 255, 149, 0.2); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .active .dot { background: var(--bot); box-shadow: 0 0 10px var(--bot); }

        .main-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; position: relative; }
        .display-card {
            width: 100%; max-width: 600px; min-height: 380px;
            background: #111; border: 2px solid #222; border-radius: 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px; position: relative; transition: 0.4s;
        }
        .display-card.truth { border-color: var(--neon); box-shadow: 0 0 30px rgba(0, 210, 255, 0.1); }
        .display-card.dare { border-color: var(--spy); box-shadow: 0 0 30px rgba(255, 0, 85, 0.1); }

        .tag { position: absolute; top: -15px; background: white; color: black; padding: 6px 25px; border-radius: 20px; font-weight: 900; }
        #questionText { font-size: 24px; font-weight: 700; line-height: 1.6; max-height: 250px; overflow-y: auto; padding: 10px; }

        .btn {
            padding: 18px 50px; border-radius: 15px; border: none; font-weight: 900;
            cursor: pointer; font-size: 18px; margin-top: 30px; transition: 0.3s;
        }
        .btn-next { background: var(--bot); color: #000; min-width: 280px; }
        .btn-next:disabled { background: #222; color: #555; cursor: not-allowed; }

        .chat-panel { background: #080808; border-right: 1px solid #222; display: flex; flex-direction: column; height: 100vh; }
        .chat-msgs { flex: 1; padding: 20px; overflow-y: auto; }
        .input-box { padding: 20px; background: #0c0c0c; display: flex; gap: 10px; border-top: 1px solid #222; }
        .input-box input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        @media (max-width: 1000px) {
            #gameScreen { grid-template-columns: 1fr; }
            .side-panel, .chat-panel { height: auto; max-height: 300px; }
        }
    </style>
</head>
<body>

<div id="joinScreen">
    <div class="join-box">
        <h1>انضم للروم</h1>
        <input type="text" id="userName" placeholder="اكتب اسمك الحقيقي...">
        <input type="text" id="roomCodeInput" placeholder="كود الروم (اختياري)">
        <button class="btn btn-next" style="margin-top:0" onclick="startApp()">دخول الآن 🔥</button>
    </div>
</div>

<div id="gameScreen">
    <aside class="side-panel">
        <div style="font-size: 11px; color: #444; font-weight: 900; margin-bottom: 20px;">اللاعبين الأونلاين</div>
        <div id="playerList"></div>
    </aside>

    <main class="main-zone">
        <div id="turnInfo" style="color: var(--bot); margin-bottom: 15px; font-weight: 900; letter-spacing: 1px;">جاري الاتصال...</div>
        <div class="display-card" id="card">
            <div class="tag" id="cardTag" style="display:none">صراحة</div>
            <div id="questionText">أهلاً بك! <br> ابدأ التحدي لما الكل يدخل..</div>
        </div>
        <button class="btn btn-next" id="spinBtn" onclick="drawCard()">التحدي التالي (30ث) 🎲</button>
    </main>

    <aside class="chat-panel">
        <div style="padding:20px; border-bottom:1px solid #222; color:var(--bot); font-weight:900;">LIVE LOG</div>
        <div class="chat-msgs" id="chatBox"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="اكتب ردك..." onkeypress="if(event.key==='Enter')sendMsg()">
        </div>
    </aside>
</div>

<script>
    // 1. إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyDCRXJY0Ve5YZIXOOnTVIwU9T1zpCSX-Cs",
        authDomain: "game-745d3.firebaseapp.com",
        databaseURL: "https://game-745d3-default-rtdb.firebaseio.com",
        projectId: "game-745d3",
        storageBucket: "game-745d3.firebasestorage.app",
        messagingSenderId: "907334488624",
        appId: "1:907334488624:web:efb34e82fa22c1fbb313f5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "";
    let myRoom = "9901";
    let allPlayers = [];
    let currentTurnIndex = 0;

    const truths = ["أكتر موقف محرج؟", "كذبة مفقستش؟", "مين الشخص الغامض هنا؟", "لو فتحت موبايل صاحبك هتشوف إيه؟", "أول حب في حياتك؟"];
    const dares = ["ابعت بحبك لآخر حد كلمته", "غني بصوت عالي", "افتح الكاميرا واعمل رقصة هندية", "اتكلم خليجي دقيقتين"];

    function startApp() {
        const nameInput = document.getElementById('userName').value.trim();
        const roomInput = document.getElementById('roomCodeInput').value.trim();
        
        if (!nameInput) return alert("من فضلك اكتب اسمك!");
        
        myName = nameInput;
        if(roomInput) myRoom = roomInput;

        // الدخول أونلاين
        const playerRef = db.ref(`arena/${myRoom}/players`).push();
        playerRef.set({ name: myName });
        playerRef.onDisconnect().remove();

        document.getElementById('joinScreen').style.display = "none";
        document.getElementById('gameScreen').style.display = "grid";

        initListeners();
        addLog("النظام", `أهلاً بك يا ${myName} في الروم ${myRoom}`);
    }

    function initListeners() {
        // مراقبة اللاعبين
        db.ref(`arena/${myRoom}/players`).on('value', (snap) => {
            const data = snap.val() || {};
            allPlayers = Object.values(data).map(p => p.name);
            updatePlayersUI();
        });

        // مراقبة التحديات
        db.ref(`arena/${myRoom}/currentAction`).on('value', (snap) => {
            const action = snap.val();
            if(action) {
                applyAction(action);
            }
        });

        // مراقبة الشات
        db.ref(`arena/${myRoom}/chat`).limitToLast(15).on('child_added', (snap) => {
            const msg = snap.val();
            addLog(msg.user, msg.text);
        });
    }

    function updatePlayersUI() {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        allPlayers.forEach((p, i) => {
            list.innerHTML += `
                <div class="player-card ${i === currentTurnIndex ? 'active' : ''}">
                    <div class="dot"></div>
                    <span style="font-weight:900;">${p} ${p === myName ? '(أنت)' : ''}</span>
                </div>`;
        });
    }

    function drawCard() {
        const isTruth = Math.random() > 0.5;
        const q = isTruth ? truths[Math.floor(Math.random() * truths.length)] : dares[Math.floor(Math.random() * dares.length)];
        const nextTurn = (currentTurnIndex + 1) % (allPlayers.length || 1);

        db.ref(`arena/${myRoom}/currentAction`).set({
            question: q,
            type: isTruth ? 'truth' : 'dare',
            turn: nextTurn,
            timestamp: Date.now()
        });
    }

    function applyAction(action) {
        currentTurnIndex = action.turn;
        updatePlayersUI();

        const card = document.getElementById('card');
        const tag = document.getElementById('cardTag');
        
        card.className = `display-card ${action.type}`;
        tag.innerText = action.type === 'truth' ? "صراحة" : "جرأة";
        tag.style.display = "block";
        tag.style.background = action.type === 'truth' ? "var(--neon)" : "var(--spy)";
        
        document.getElementById('questionText').innerText = action.question;
        document.getElementById('turnInfo').innerText = `دور: ${allPlayers[currentTurnIndex] || '...'}`;

        startTimer();
    }

    function startTimer() {
        const btn = document.getElementById('spinBtn');
        let time = 30;
        btn.disabled = true;
        const timer = setInterval(() => {
            time--;
            btn.innerText = `انتظر (${time}ث)`;
            if (time <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "التحدي التالي 🎲";
            }
        }, 1000);
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if (input.value.trim()) {
            db.ref(`arena/${myRoom}/chat`).push({
                user: myName,
                text: input.value
            });
            input.value = "";
        }
    }

    function addLog(user, text) {
        const box = document.getElementById('chatBox');
        const color = user === "النظام" ? "var(--bot)" : "white";
        box.innerHTML += `<div style="margin-bottom:10px; font-size:14px; color:${color}"><b>${user}:</b> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
