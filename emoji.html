<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما الإيموجي - 90 تحدي مصري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden;
        }

        .cinema-hall {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        .room-tag {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 215, 0, 0.1); padding: 10px 20px;
            border-radius: 10px; border: 1px solid #f1c40f;
            font-weight: bold; color: #f1c40f; z-index: 100;
        }

        .screen-container {
            width: 85%; max-width: 900px;
            height: 45vh; margin-top: 40px;
            background: #fff; border-radius: 5px;
            box-shadow: 0 0 100px rgba(255, 255, 255, 0.1);
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            border: 12px solid #111;
        }

        #emoji-display {
            font-size: 8rem;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.4));
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #answer-input {
            width: 70%; padding: 15px; border-radius: 10px; border: none;
            font-size: 1.5rem; text-align: center; background: #eee; color: #000;
            outline: none; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .audience-area {
            width: 100%; display: flex; justify-content: center;
            gap: 25px; margin-top: auto; padding-bottom: 50px;
        }

        .seat-slot { position: relative; display: flex; flex-direction: column; align-items: center; width: 80px; }

        /* النقط فوق اللاعب */
        .player-score-bubble {
            position: absolute; top: -30px;
            background: #f1c40f; color: #000;
            padding: 2px 8px; border-radius: 20px;
            font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 0 10px #f1c40f;
            display: none; /* مخفي لحد ما اللاعب يبدأ يجمع نقط */
        }

        .avatar-placeholder {
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2);
            margin-bottom: 10px; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .avatar-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .seat-slot.me .avatar-placeholder {
            border: 3px solid #f1c40f; box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }

        .cinema-seat {
            width: 60px; height: 45px; background: #700;
            border-radius: 10px 10px 2px 2px; border-bottom: 6px solid #400;
        }

        .name-label { font-size: 0.8rem; margin-top: 10px; color: #aaa; font-weight: bold; text-align: center; }
        .seat-slot.me .name-label { color: #f1c40f; }

        .game-stats { display: flex; gap: 40px; margin-top: 20px; font-size: 1.3rem; }
        .stat-val { color: #f1c40f; font-weight: bold; }

        /* شاشة الترتيب النهائي */
        #final-leaderboard {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .podium-list { list-style: none; padding: 0; width: 320px; }
        .podium-item {
            background: rgba(255,255,255,0.05); margin: 10px 0;
            padding: 15px; border-radius: 10px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid #333; transition: 0.3s;
        }
        .rank-1 { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); color: #f1c40f; }
    </style>
</head>
<body>

    <div id="final-leaderboard">
        <h1 style="color: #f1c40f; margin-bottom: 30px;"><i class="fas fa-trophy"></i> ترتيب الأبطال</h1>
        <div class="podium-list" id="winners-list"></div>
        <button onclick="location.reload()" style="background:#f1c40f; color:#000; border:none; padding:12px 40px; border-radius:30px; cursor:pointer; font-weight:bold; margin-top:20px;">العب من جديد</button>
    </div>

    <div class="cinema-hall">
        <div class="room-tag">رقم الغرفة: <span id="room-id">--</span></div>

        <div class="game-stats">
            <div>الجولة: <span id="round-count" class="stat-val">1/90</span></div>
            <div>الوقت: <span id="timer" class="stat-val">20</span></div>
            <div>نقاطي: <span id="score" class="stat-val">0</span></div>
        </div>

        <div class="screen-container">
            <div id="emoji-display">🎬</div>
            <div class="input-overlay" id="input-screen">
                <h2 style="color:#f1c40f; margin-bottom: 20px;">خمن اسم العمل!</h2>
                <input type="text" id="answer-input" placeholder="اكتب هنا..." autocomplete="off">
            </div>
        </div>

        <div class="audience-area">
            <div class="seat-slot me">
                <div class="player-score-bubble" id="p1-score-bubble">0</div>
                <div class="avatar-placeholder" id="my-avatar"><i class="fas fa-user"></i></div>
                <div class="cinema-seat"></div>
                <div class="name-label" id="my-name">تحميل..</div>
            </div>
            
            <div class="seat-slot"><div class="avatar-placeholder"><i class="fas fa-plus" style="opacity:0.1"></i></div><div class="cinema-seat"></div><div class="name-label">فارغ</div></div>
            <div class="seat-slot"><div class="avatar-placeholder"><i class="fas fa-plus" style="opacity:0.1"></i></div><div class="cinema-seat"></div><div class="name-label">فارغ</div></div>
            <div class="seat-slot"><div class="avatar-placeholder"><i class="fas fa-plus" style="opacity:0.1"></i></div><div class="cinema-seat"></div><div class="name-label">فارغ</div></div>
            <div class="seat-slot"><div class="avatar-placeholder"><i class="fas fa-plus" style="opacity:0.1"></i></div><div class="cinema-seat"></div><div class="name-label">فارغ</div></div>
        </div>
    </div>

    <script>
        const db = [
            {q: "🐘🟦", a: "الفيل الازرق"}, {q: "👳‍♂️🏢", a: "عسل اسود"}, {q: "🕶️👨‍👩‍👧‍👦", a: "ولاد رزق"}, {q: "👮‍♂️🧺", a: "الخلية"}, {q: "🚢🥶", a: "تيتانيك"},
            {q: "👰🏢", a: "نيللي وشريهان"}, {q: "🧖‍♂️👜", a: "الناظر"}, {q: "🧛‍♂️🏠", a: "ما وراء الطبيعة"}, {q: "🕵️‍♂️📺", a: "الاختيار"}, {q: "🤡🎈", a: "ات"},
            // ... (ضع الـ 90 سؤال هنا)
            {q: "🎭🏛️", a: "المتزوجون"}
        ];

        let idx = 0; let score = 0; let timer; let time = 20;

        function sync() {
            const name = localStorage.getItem('playerName') || "لاعب مجهول";
            const img = localStorage.getItem('savedImg');
            document.getElementById('my-name').innerText = name;
            if(img) document.getElementById('my-avatar').innerHTML = `<img src="${img}">`;
            document.getElementById('room-id').innerText = Math.floor(1000 + Math.random() * 9000);
        }

        function play() {
            if(idx >= db.length) return showFinalResults();
            
            const screen = document.getElementById('emoji-display');
            const inputScreen = document.getElementById('input-screen');
            const input = document.getElementById('answer-input');

            screen.innerText = db[idx].q;
            inputScreen.style.display = 'none';
            input.value = '';
            document.getElementById('round-count').innerText = `${idx + 1}/90`;

            setTimeout(() => {
                inputScreen.style.display = 'flex';
                input.focus();
            }, 3000);

            time = 20;
            document.getElementById('timer').innerText = time;
            clearInterval(timer);
            timer = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = time;
                if(time <= 0) check();
            }, 1000);
        }

        function check() {
            clearInterval(timer);
            const userAns = document.getElementById('answer-input').value.trim();
            if(userAns === db[idx].a) {
                score += 10 + time;
                document.getElementById('score').innerText = score;
                
                // إظهار النقط فوق اللاعب وتحديثها
                const bubble = document.getElementById('p1-score-bubble');
                bubble.innerText = score;
                bubble.style.display = 'block';
            }
            idx++;
            play();
        }

        function showFinalResults() {
            document.getElementById('final-leaderboard').style.display = 'flex';
            const winnersList = document.getElementById('winners-list');

            // في الأونلاين هنا هيتم تجميع نقط كل اللاعبين الحقيقيين
            let playersData = [
                { name: document.getElementById('my-name').innerText, score: score }
                // هنا يتم إضافة باقي اللاعبين من السيرفر
            ];

            // ترتيب تنازلي
            playersData.sort((a, b) => b.score - a.score);

            winnersList.innerHTML = playersData.map((p, i) => `
                <li class="podium-item ${i === 0 ? 'rank-1' : ''}">
                    <span>#${i+1} ${p.name}</span>
                    <span>${p.score} نقطة</span>
                </li>
            `).join('');
        }

        document.getElementById('answer-input').addEventListener('keypress', e => { if(e.key === 'Enter') check(); });

        window.onload = () => { sync(); play(); };
    </script>
</body>
</html>
