<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر السيطرة | زيزو المشاغب</title>
    <style>
        :root { --main: #00ffcc; --bg: #050505; --panel: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 1000px; height: 750px; display: flex; background: var(--panel); border-radius: 30px; overflow: hidden; box-shadow: 0 0 50px rgba(0, 255, 204, 0.15); border: 1px solid #222; }
        .side { width: 280px; background: #0a0a0a; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .side-title { padding: 30px; background: var(--main); color: #000; font-weight: 900; text-align: center; font-size: 1.2rem; }
        .profile-select { padding: 20px; color: #fff; border-bottom: 1px solid #222; text-align: center; }
        
        /* تعديل لعرض صورة البروفايل في السايد بار */
        #my-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--main); margin-bottom: 10px; object-fit: cover; }

        .slots { padding: 20px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
        .slot-box { padding: 15px; border-radius: 12px; background: #151515; border: 1px dashed #333; text-align: center; color: #444; font-size: 0.8rem; transition: 0.3s; }
        .slot-box.active { border: 1px solid var(--main); color: var(--main); font-weight: bold; background: rgba(0,255,204,0.05); }

        .chat { flex: 1; display: flex; flex-direction: column; }
        .nav { padding: 20px; background: #0f0f0f; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1a1a1a; }
        .nav img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--main); }
        #screen { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #121212; }
        .bubble { padding: 15px 22px; border-radius: 20px; max-width: 80%; line-height: 1.6; position: relative; transition: all 0.3s; }
        .z-msg { background: #1e1e1e; color: var(--main); align-self: flex-start; border-right: 5px solid var(--main); }
        .u-msg { background: var(--main); color: #000; align-self: flex-end; font-weight: 900; }
        .lamp-img { width: 180px; border-radius: 10px; margin-top: 10px; border: 2px solid var(--main); display: block; box-shadow: 0 0 15px var(--main); }
        .input-bar { padding: 25px; background: #0a0a0a; display: flex; gap: 15px; }
        input { flex: 1; background: #1a1a1a; padding: 18px; border-radius: 15px; color: #fff; outline: none; border: 1px solid #222; }
        button { background: var(--main); color: #000; padding: 0 35px; border-radius: 15px; font-weight: 900; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="side">
        <div class="side-title">كراسي الصحاب ⚡</div>
        <div class="profile-select">
            <img src="" id="my-avatar" alt="بروفايلي">
            <div id="my-name" style="font-weight: bold; color: var(--main);">جاري التحميل...</div>
        </div>
        <div class="slots" id="slots-container">
            <div class="slot-box" id="slot-0">مكان أخوك السيطرة</div>
            <div class="slot-box" id="slot-1">كرسي الشبح اللي جاي</div>
            <div class="slot-box" id="slot-2">محجوز للرجالة</div>
        </div>
    </div>

    <div class="chat">
        <div class="nav">
            <img src="https://robohash.org/zizo-the-boss?set=set2" alt="زيزو">
            <div>
                <h2 style="color: var(--main);">زيزو المشاغب</h2>
                <small style="color: #666;">بيرد على اللي يدلعه بس..</small>
            </div>
        </div>
        <div id="screen">
            <div class="bubble z-msg">نايمين؟ مسمعش صوت حد إلا لو ناديتوني يا "زوز".</div>
        </div>
        <div class="input-bar">
            <input type="text" id="msg-in" placeholder="ارمي الكلام...">
            <button id="send-btn">إرسال</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // الكونفيج الخاص بك جاهز
    const firebaseConfig = {
        apiKey: "AIzaSyDl6YLqSMoP9Jc4RV_m4SFknwntBIsMpG4",
        authDomain: "zizo-78bba.firebaseapp.com",
        databaseURL: "https://zizo-78bba-default-rtdb.firebaseio.com",
        projectId: "zizo-78bba",
        storageBucket: "zizo-78bba.firebasestorage.app",
        messagingSenderId: "277529747737",
        appId: "1:277529747737:web:c16ba066d7c94ca2236588",
        measurementId: "G-NZ7QL5SX1K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // سحب بياناتك الحقيقية من صفحة الـ index
    const savedData = localStorage.getItem('userData');
    const userAvatar = localStorage.getItem('userAvatar') || "https://api.dicebear.com/7.x/avataaars/svg?seed=Zizo";
    
    let playerName = "لاعب مجهول";
    let playerGender = "male";

    if(savedData) {
        const parsed = JSON.parse(savedData);
        playerName = parsed.name || "لاعب مجهول";
        playerGender = (parsed.gender === "أنثى") ? "female" : "male";
    }

    // تحديث واجهة البروفايل الشخصي
    document.getElementById('my-avatar').src = userAvatar;
    document.getElementById('my-name').innerText = playerName;

    const screen = document.getElementById('screen');
    const lampImgPath = "lamp.jpg"; 
    const userId = "user_" + Math.random().toString(36).substr(2, 9);
    const userRef = ref(db, 'online_chat/players/' + userId);

    // تسجيل الدخول بالبيانات الحقيقية
    set(userRef, { 
        name: playerName,
        gender: playerGender,
        avatar: userAvatar
    });
    
    onDisconnect(userRef).remove();

    // تحديث الكراسي لحظياً
    onValue(ref(db, 'online_chat/players'), (snapshot) => {
        const data = snapshot.val();
        // تصفية الكراسي
        for(let i=0; i<3; i++) {
            let slot = document.getElementById(`slot-${i}`);
            slot.className = "slot-box";
            slot.innerText = (i==0) ? "مكان أخوك السيطرة" : (i==1) ? "كرسي الشبح اللي جاي" : "محجوز للرجالة";
        }
        // توزيع اللاعبين
        if(data) {
            let index = 0;
            Object.keys(data).forEach(id => {
                if(index < 3) {
                    let slot = document.getElementById(`slot-${index}`);
                    slot.className = "slot-box active";
                    slot.innerText = "⚡ " + data[id].name;
                    index++;
                }
            });
        }
    });

    // منطق الشات
    window.push = function() {
        const input = document.getElementById('msg-in');
        if (!input.value.trim()) return;
        
        const userVal = input.value.toLowerCase();
        add(input.value, 'u-msg');
        input.value = "";

        const nicknames = ["زيزو", "يا زيزو", "زوز", "يا زوز", "زيز", "يا زميلي"];
        const mentioned = nicknames.some(n => userVal.includes(n));

        if (mentioned) {
            setTimeout(() => {
                const response = zizoMaster();
                add(response.text, 'z-msg');
            }, 800);
        }
    }

    document.getElementById('send-btn').onclick = push;
    document.getElementById('msg-in').onkeypress = (e) => { if(e.key==='Enter') push(); };

    function add(t, c, img = null) {
        const d = document.createElement('div');
        d.className = `bubble ${c}`;
        d.innerText = t;
        if (img) {
            const image = document.createElement('img');
            image.src = img;
            image.className = 'lamp-img';
            image.onerror = () => image.style.display='none';
            d.appendChild(image);
        }
        screen.appendChild(d);
        screen.scrollTop = screen.scrollHeight;
    }

    // رسائل زيزو التلقائية بناءً على نوعك
    setInterval(() => {
        let text = (playerGender === 'female') ? "بينور عشان عيونك يا قطة.. " : "بنور عشان كبسة.. حد هنا مش تمام؟";
        add(text, 'z-msg', lampImgPath);
    }, 70000);

    function zizoMaster() {
        const maleReplies = ["قلب زيزو من جوه.. عايز قفا؟", "نعم يا ليفا؟ أؤمر يا فرفور.", "زيزو السيطرة حضر.. ارفع إيدك فوق!", "أحلى مسا على الرجالة.. مسمعش صوت بقى.", "زيزو المشاغب مبيسيبش حقه.. خد بالك."];
        const femaleReplies = ["يا عيون زيزو.. قولي يا قمر تاني كدة؟", "أيوة يا بسكوتة.. السيرفر نور فجأة ليه؟ 😉", "زيزو قلبه لان.. تؤمري بأيه يا ست البنات؟", "أنا سرسجي مع الكل، بس معاكي بقلب رومانسي.", "يا أرض اتهدي.. القمر ناداني باسمي."];
        let pool = (playerGender === 'female') ? femaleReplies : maleReplies;
        return { text: pool[Math.floor(Math.random() * pool.length)] };
    }
</script>
</body>
</html>
