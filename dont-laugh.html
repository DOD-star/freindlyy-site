<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الضحك | الغرفة السرية 🕵️‍♂️</title>
    <style>
        :root { 
            --neon-yellow: #f1c40f; 
            --neon-blue: #00f2ff;
            --secret-purple: #9b59b6;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        
        body { 
            margin: 0; background: #090a0f; color: white; height: 100vh; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }

        /* الخلفية والنجوم */
        #stars { position: absolute; inset: 0; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .moon { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: #f5f3ce; border-radius: 50%; box-shadow: 0 0 30px rgba(241, 196, 15, 0.2); z-index: 1; }

        /* شريط الحالة */
        .status-bar {
            position: absolute; top: 15px; padding: 5px 20px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon-blue); border-radius: 50px; font-size: 0.8rem;
            display: flex; align-items: center; gap: 8px; z-index: 100;
        }
        .online-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 10px #2ecc71; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* الشاشات */
        .screen { display: none; position: relative; z-index: 10; width: 90%; max-width: 500px; text-align: center; }
        .active { display: flex; flex-direction: column; animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* الكروت */
        .main-card { 
            background: var(--glass); backdrop-filter: blur(25px); padding: 35px; 
            border-radius: 40px; border: 2px solid var(--neon-yellow); 
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.1);
        }

        /* تصميم الغرفة السرية */
        .secret-room { border-color: var(--secret-purple); background: rgba(20, 0, 40, 0.6); box-shadow: 0 0 50px rgba(155, 89, 182, 0.2); }
        
        .joke-card {
            background: #fff; color: #000; padding: 35px; border-radius: 25px;
            font-size: 1.5rem; font-weight: bold; margin: 25px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative;
            transform-style: preserve-3d; animation: throw 0.6s ease-out;
        }
        @keyframes throw { from { transform: translateY(100px) rotateX(45deg); opacity: 0; } }

        /* الأزرار */
        .btn { padding: 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-yellow { background: var(--neon-yellow); color: #000; width: 100%; margin-top: 10px; }
        .btn-add { background: transparent; border: 1px solid var(--secret-purple); color: var(--secret-purple); margin-bottom: 10px; }
        .btn-add:hover { background: var(--secret-purple); color: white; }

        textarea { 
            width: 100%; height: 100px; background: rgba(0,0,0,0.5); border: 1px solid var(--secret-purple);
            border-radius: 20px; color: white; padding: 20px; margin: 15px 0; outline: none; resize: none;
        }

        #myJokesList { max-height: 80px; overflow-y: auto; text-align: right; font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .author-box { margin-top: 15px; padding: 10px; border: 1px dashed var(--neon-blue); border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div class="moon"></div>

    <div class="status-bar">
        <div class="online-dot"></div>
        <span id="roomInfo">غرفة خاصة #----</span>
    </div>

    <div id="lobby" class="screen active">
        <div class="main-card">
            <h1 style="color:var(--neon-yellow)">تحدي الضحك 😂</h1>
            <input type="text" id="roomCodeInp" placeholder="ادخل كود الغرفة" style="width:100%; padding:15px; border-radius:15px; background:black; border:1px solid var(--neon-blue); color:white; text-align:center; margin-bottom:15px;">
            <button class="btn btn-yellow" onclick="checkCode()">دخول الغرفة 🔒</button>
        </div>
    </div>

    <div id="secret-room" class="screen">
        <div class="main-card secret-room">
            <h2 style="color:var(--secret-purple)">الغرفة السرية 🤫</h2>
            <div id="myJokesList"></div>
            <textarea id="jokeInp" placeholder="اكتب نكتة أو فضيحة هنا..."></textarea>
            <button class="btn btn-add" style="width:100%" onclick="addJokeToList()">➕ إضافة نكتة تانية</button>
            <button class="btn btn-yellow" style="background:var(--secret-purple); color:white;" onclick="finishWriting()">إرسال كل النكت (جاهز) 🚀</button>
        </div>
    </div>

    <div id="play-screen" class="screen">
        <div class="main-card">
            <div style="display:flex; justify-content:space-between; color:var(--neon-yellow); font-size:0.8rem;">
                <span id="progress">نكتة 1/1</span>
                <span>LIVE 🔴</span>
            </div>
            <div class="joke-card" id="displayBox">...</div>
            
            <div id="rateSection" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn" style="background:#2ecc71; color:white;" onclick="rate('good')">🤣 جامدة</button>
                <button class="btn" style="background:#e74c3c; color:white;" onclick="rate('bad')">👎 بييض</button>
            </div>

            <div class="author-box" id="authorBox">الكاتب: <b id="authorName" style="color:var(--neon-blue)">...</b></div>
            <button id="nextBtn" class="btn btn-yellow" style="display:none;" onclick="showNext()">النكتة التالية ➡️</button>
        </div>
    </div>

    <script>
        let myJokes = [];
        let allGameJokes = [];
        let currentIndex = 0;

        function checkCode() {
            const code = document.getElementById('roomCodeInp').value;
            if(!code) return alert("دخل الكود الأول!");
            document.getElementById('roomInfo').innerText = "غرفة خاصة #" + code;
            switchScreen('secret-room');
        }

        function addJokeToList() {
            const inp = document.getElementById('jokeInp');
            if(!inp.value.trim()) return;
            myJokes.push(inp.value.trim());
            document.getElementById('myJokesList').innerHTML += `<div>• ${inp.value.substring(0,20)}...</div>`;
            inp.value = "";
            inp.focus();
        }

        function finishWriting() {
            const lastJoke = document.getElementById('jokeInp').value.trim();
            if(lastJoke) myJokes.push(lastJoke);
            if(myJokes.length === 0) return alert("اكتب نكتة واحدة على الأقل!");

            const myName = localStorage.getItem('sohra_name') || "أنت";
            // محاكاة دمج نكتك مع نكت صحابك
            allGameJokes = myJokes.map(j => ({ t: j, a: myName }));
            allGameJokes.push({ t: "مرة واحد ميكانيكي فتح مطعم سماه (تيل فرامل) 😂", a: "مروان" });
            
            allGameJokes.sort(() => Math.random() - 0.5); // لخبطة النكت
            switchScreen('play-screen');
            render();
        }

        function render() {
            document.getElementById('authorBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('rateSection').style.opacity = '1';
            document.getElementById('rateSection').style.pointerEvents = 'auto';
            
            const joke = allGameJokes[currentIndex];
            document.getElementById('displayBox').innerText = joke.t;
            document.getElementById('progress').innerText = `نكتة ${currentIndex+1}/${allGameJokes.length}`;
        }

        function rate(res) {
            document.getElementById('rateSection').style.opacity = '0.3';
            document.getElementById('rateSection').style.pointerEvents = 'none';
            document.getElementById('authorBox').style.display = 'block';
            document.getElementById('authorName').innerText = allGameJokes[currentIndex].a;
            document.getElementById('nextBtn').style.display = 'block';
            
            if(res === 'good') createEmojis('😂');
        }

        function showNext() {
            currentIndex++;
            if(currentIndex < allGameJokes.length) render();
            else { alert("خلصنا! نورتوا الغرفة السرية."); location.reload(); }
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function createEmojis(emoji) {
            for(let i=0; i<8; i++) {
                const e = document.createElement('div');
                e.innerText = emoji;
                e.style.cssText = `position:fixed; left:${Math.random()*100}%; bottom:0; font-size:2rem; animation: flyUp 2s forwards; z-index:1000;`;
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 2000);
            }
        }

        // نجوم الخلفية
        const starsContainer = document.getElementById('stars');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random()*2.5+'px';
            s.style.top = Math.random()*100+'vh'; s.style.left = Math.random()*100+'vw';
            s.style.setProperty('--d', (Math.random()*3+2)+'s');
            starsContainer.appendChild(s);
        }
    </script>
    <style> @keyframes flyUp { to { transform: translateY(-100vh) rotate(360deg); opacity:0; } } </style>
</body>
</html>
