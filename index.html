<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Registration</title>
    <style>
        /* أنيميشن للخلفية */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0b0e1a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .main-container {
            background: rgba(22, 27, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            width: 400px;
            border: 2px solid #00d2ff;
            box-shadow: 0 0 20px #00d2ff66;
            text-align: center;
            z-index: 10;
        }

        h1 { font-size: 28px; margin-bottom: 20px; text-shadow: 0 0 10px #00d2ff; }

        .input-group { margin-bottom: 15px; text-align: right; }
        
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #00d2ff; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2d3446;
            background: #0b0e1a;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        .img-upload {
            width: 100px;
            height: 100px;
            border: 2px dashed #9d50bb;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            background: #1a1a2e;
            position: relative;
        }

        .img-upload img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: none; 
        }

        #plus { font-size: 30px; color: #9d50bb; }

        .play-btn {
            background: linear-gradient(90deg, #00d2ff, #9d50bb);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #9d50bb;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>CREATE PROFILE</h1>

        <div class="img-upload" onclick="document.getElementById('hiddenFile').click()">
            <span id="plus">+</span>
            <img id="userAvatar" src="" alt="avatar">
        </div>
        <input type="file" id="hiddenFile" hidden accept="image/*">

        <div class="input-group">
            <label>Nickname</label>
            <input type="text" id="nickName" placeholder="Enter your name...">
        </div>

        <div class="input-group">
            <label>Country</label>
            <input type="text" id="userCountry" placeholder="Egypt, KSA, etc...">
        </div>

        <div class="input-group">
            <label>Gender</label>
            <select id="userGender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <button class="play-btn" id="saveBtn" onclick="saveAndPlay()">SAVE & PLAY</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDCRXJY0Ve5YZIXOOnTVIwU9T1zpCSX-Cs",
          authDomain: "game-745d3.firebaseapp.com",
          databaseURL: "https://game-745d3-default-rtdb.firebaseio.com",
          projectId: "game-745d3",
          storageBucket: "game-745d3.firebasestorage.app",
          messagingSenderId: "907334488624",
          appId: "1:907334488624:web:efb34e82fa22c1fbb313f5"
        };

        // تشغيل وإجبار السيرفر يفتح فوراً
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        database.goOnline(); // أهم سطر لفك التهنيج

        const fileInput = document.getElementById('hiddenFile');
        const userAvatar = document.getElementById('userAvatar');
        const plusSign = document.getElementById('plus');

        fileInput.onchange = function() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    userAvatar.src = base64Image;
                    userAvatar.style.display = 'block';
                    plusSign.style.display = 'none';
                    localStorage.setItem('savedImg', base64Image);
                }
                reader.readAsDataURL(file);
            }
        }

        function saveAndPlay() {
            const btn = document.getElementById('saveBtn');
            const name = document.getElementById('nickName').value.trim();
            const country = document.getElementById('userCountry').value.trim();
            const gender = document.getElementById('userGender').value;
            const img = localStorage.getItem('savedImg') || "";

            if(!name || !country) {
                alert("يا وحش املأ البيانات الأول! 😂");
                return;
            }

            btn.innerText = "SAVING...";
            btn.disabled = true;

            // الحفظ مع إضافة "Error Catching" عشان لو السيرفر رفض يقولنا ليه
            database.ref('players/' + name).set({
                nickname: name,
                country: country,
                gender: gender,
                avatar: img,
                status: "online"
            }, (error) => {
                if (error) {
                    alert("السيرفر رفض الحفظ: " + error.message);
                    btn.innerText = "SAVE & PLAY";
                    btn.disabled = false;
                } else {
                    localStorage.setItem('playerName', name);
                    window.location.href = "play.html";
                }
            });
        }
    </script>
</body>
</html>
