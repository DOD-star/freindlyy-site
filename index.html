<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHRA HUB | بوابة الأساطير 🎮</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --bg: #05070a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; transition: 0.3s; }
        
        body { 
            margin: 0; background: var(--bg); color: white; height: 100vh; overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        /* شاشة التحميل الدرامية */
        #loader-screen {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-bar { width: 300px; height: 10px; background: #111; border-radius: 10px; overflow: hidden; margin-top: 20px; border: 1px solid #333; }
        .progress { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* الكارت الرئيسي */
        #reg-card {
            display: none; background: rgba(10, 10, 20, 0.95); padding: 30px; border-radius: 25px;
            border: 1px solid var(--neon); width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        /* منطقة الصورة والتاج */
        .avatar-wrapper { position: relative; width: 140px; height: 140px; margin: 0 auto 20px; }
        #main-pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--neon); background: #000; }
        #crown-img { 
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%); 
            width: 80px; z-index: 10; display: none; filter: drop-shadow(0 0 5px var(--gold));
        }

        /* اختيار الأفاتار الكرتون */
        .avatars-list { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .av-item { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .av-item:hover { border-color: var(--neon); transform: scale(1.1); }

        /* المدخلات */
        .inputs { display: flex; flex-direction: column; gap: 12px; }
        input, select { 
            padding: 12px; background: #000; border: 1px solid #333; color: white; 
            border-radius: 10px; font-size: 1rem; outline: none; text-align: center;
        }
        input:focus { border-color: var(--neon); }

        .btn-go {
            width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px; border: none;
            background: var(--neon); color: #000; font-weight: bold; font-size: 1.2rem; cursor: pointer;
        }
        .btn-go:hover { box-shadow: 0 0 20px var(--neon); }

        .fade-out { opacity: 0; pointer-events: none; transform: scale(1.1); }
    </style>
</head>
<body>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <div id="loader-screen">
        <h2 style="letter-spacing: 5px; color: var(--neon);">SOHRA GAMING</h2>
        <div class="loader-bar"><div class="progress" id="pg-bar"></div></div>
        <p id="pg-text" style="margin-top: 10px;">0%</p>
    </div>

    <div id="reg-card">
        <div class="avatar-wrapper">
            <img id="crown-img" src=""> <img id="main-pfp" src="https://api.dicebear.com/7.x/avataaars/svg?seed=1">
        </div>

        <div class="avatars-list">
            <img class="av-item" src="https://api.dicebear.com/7.x/avataaars/svg?seed=1" onclick="changeAv(this.src)">
            <img class="av-item" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" onclick="changeAv(this.src)">
            <img class="av-item" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" onclick="changeAv(this.src)">
            <label style="background:#222; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                🖼️ <input type="file" hidden accept="image/*" onchange="upload(this)">
            </label>
        </div>

        <div class="inputs">
            <input type="text" id="u-name" placeholder="اسمك الحقيقي">
            <input type="text" id="u-title" placeholder="لقبك (مثلاً: الكابوس)">
            <input type="text" id="u-country" placeholder="بلدك">
            <select id="u-gender" onchange="updateCrown()">
                <option value="">اختار النوع</option>
                <option value="king">ملك (تاج رجالي 👑)</option>
                <option value="queen">ملكة (تاج بناتي 👸)</option>
            </select>
        </div>

        <button class="btn-go" onclick="finish()">دخول المجلس 🚀</button>
    </div>

    <script>
        // 1. نظام التحميل 10 ثواني
        let p = 0;
        const bar = document.getElementById('pg-bar');
        const txt = document.getElementById('pg-text');
        
        const load = setInterval(() => {
            p++;
            bar.style.width = p + "%";
            txt.innerText = p + "%";
            if(p >= 100) {
                clearInterval(load);
                document.getElementById('loader-screen').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('loader-screen').style.display = 'none';
                    document.getElementById('reg-card').style.display = 'block';
                    document.getElementById('bgMusic').play();
                }, 1000);
            }
        }, 100);

        // 2. تغيير الصور
        function changeAv(s) { document.getElementById('main-pfp').src = s; }
        function upload(i) {
            const r = new FileReader();
            r.onload = e => document.getElementById('main-pfp').src = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        // 3. تحديث التاج
        function updateCrown() {
            const g = document.getElementById('u-gender').value;
            const c = document.getElementById('crown-img');
            if(g === 'king') {
                c.src = "king-crown.png"; 
                c.style.display = 'block';
            } else if(g === 'queen') {
                c.src = "queen-crown.png"; 
                c.style.display = 'block';
            } else {
                c.style.display = 'none';
            }
        }

        // 4. الحفظ النهائي والربط بصفحة اللوبي الـ 3D
        function finish() {
            const data = {
                name: document.getElementById('u-name').value,
                title: document.getElementById('u-title').value,
                country: document.getElementById('u-country').value,
                photo: document.getElementById('main-pfp').src,
                gender: document.getElementById('u-gender').value
            };

            if(!data.name || !data.title) return alert("البيانات ناقصة يا بطل!");

            // تخزين الاسم عشان يظهر في صفحة الـ 3D
            localStorage.setItem('warrior_name', data.name);
            localStorage.setItem('user_name', data.name);
            localStorage.setItem('user_title', data.title);
            localStorage.setItem('user_country', data.country);
            localStorage.setItem('user_photo', data.photo);
            localStorage.setItem('user_gender', data.gender);
            localStorage.setItem('is_logged', 'true');

            // هينقلك لصفحة اللوبي اللي فيها البطل 3D
            window.location.href = "battle_lobby.html";
        }

        // لو مسجل قبل كدة يدخله على اللوبي فوراً
        if(localStorage.getItem('is_logged')) {
            window.location.href = "battle_lobby.html";
        }
    </script>
</body>
</html>
