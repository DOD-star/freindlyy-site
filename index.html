<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Gaming</title>
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #9d50bb;
            --bg: #060918;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* هيدر البروفايل المعلق */
        .profile-header {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #preview-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
            border: 2px solid var(--primary);
        }

        /* كارت التسجيل */
        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .upload-area {
            border: 2px dashed var(--primary);
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-go {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="profile-header">
        <span id="header-name">لاعب جديد</span>
        <img src="https://via.placeholder.com/40" id="preview-img" alt="Profile">
    </div>

    <div class="login-card">
        <h2>إنشاء بروفايل 🎮</h2>
        
        <input type="text" id="username" placeholder="اسمك المستعار">
        <input type="text" id="country" placeholder="بلدك">
        
        <select id="gender">
            <option value="ذكر">ذكر</option>
            <option value="أنثى">أنثى</option>
        </select>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p id="statusText">اضغط لرفع صورتك 📸</p>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>

        <button class="btn-go" onclick="saveAndRedirect()">دخول الألعاب</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('preview-img');
        const headerName = document.getElementById('header-name');

        // كود معالجة الصورة وظهورها فوق فوراً
        fileInput.onchange = function() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    document.getElementById('statusText').innerText = "✅ تم اختيار الصورة";
                    // حفظ الصورة في LocalStorage (كـ Base64)
                    localStorage.setItem('userAvatar', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        };

        // تحديث الاسم فوق وأنت بتكتب (تفاعل لحظي)
        document.getElementById('username').oninput = function() {
            headerName.innerText = this.value || "لاعب جديد";
        };

        function saveAndRedirect() {
            const userData = {
                name: document.getElementById('username').value,
                country: document.getElementById('country').value,
                gender: document.getElementById('gender').value
            };

            if(!userData.name) {
                alert("اكتب اسمك الأول يا بطل!");
                return;
            }

            // حفظ البيانات
            localStorage.setItem('userData', JSON.stringify(userData));

            // الانتقال لصفحة تانية (اتأكد إنك هتعمل ملف اسمه games.html)
            window.location.href = "games.html";
        }
    </script>
</body>
</html>
