<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GAME - IDENTITY CHECK</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; }
        .cyber-box { background: rgba(0, 0, 0, 0.9); padding: 30px; border: 2px solid #0ff; box-shadow: 0 0 20px #0ff; width: 350px; border-radius: 10px; text-align: center; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #0ff; }
        .img-upload { width: 80px; height: 80px; border: 2px dashed #0ff; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background-size: cover; background-position: center; }
        button { width: 100%; padding: 12px; background: #0ff; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #error-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: red; color: white; padding: 20px; display: none; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="error-msg">راجع بياناتك يا جندي!</div>
    <div class="cyber-box">
        <h2 style="color:#0ff; letter-spacing:3px;">IDENTITY CHECK</h2>
        <div class="img-upload" id="imgPreview" onclick="document.getElementById('fileInput').click()"><span id="plus">+</span></div>
        <input type="file" id="fileInput" style="display:none" accept="image/*">
        <input type="text" id="fullName" placeholder="Full Name">
        <input type="text" id="nickName" placeholder="Nick Name">
        <input type="text" id="country" placeholder="Country">
        <button onclick="validateAndSave()">ACCESS GRANTED</button>
    </div>

    <script>
        let profilePicData = "";
        document.getElementById('fileInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(){
                profilePicData = reader.result;
                document.getElementById('imgPreview').style.backgroundImage = `url(${reader.result})`;
                document.getElementById('plus').style.display = 'none';
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function validateAndSave() {
            const name = document.getElementById('fullName').value;
            const nick = document.getElementById('nickName').value;
            const country = document.getElementById('country').value;
            if(!name || !nick || !country || !profilePicData) {
                document.getElementById('error-msg').style.display = 'block';
                setTimeout(() => document.getElementById('error-msg').style.display = 'none', 2000);
                return;
            }
            localStorage.setItem('p_name', name);
            localStorage.setItem('p_nick', nick);
            localStorage.setItem('p_country', country);
            localStorage.setItem('p_img', profilePicData);
            window.location.href = "lobby.html"; // هينقلك للوبي بعد التسجيل
        }
    </script>
</body>
</html>
