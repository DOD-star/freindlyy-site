<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="utf-8">
    <title>WAR ZONE - ELITE ACHIEVEMENTS</title>
    <style>
        :root {
            --glow: #0ff;
            --bg: #030303;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.05) 0%, transparent 40%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .achievements-wrapper {
            width: 90%; max-width: 1000px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 50px; border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 20px;
        }

        .header h1 {
            margin: 0; font-size: 28px; letter-spacing: 8px;
            text-transform: uppercase; color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .stats-brief { font-size: 12px; color: var(--glow); letter-spacing: 2px; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px; border-radius: 15px;
            display: flex; align-items: center; gap: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(0, 255, 255, 0.3);
        }

        /* حالة الإنجاز المكتمل */
        .card.unlocked {
            border: 1px solid var(--glow);
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.05), 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .card.unlocked::after {
            content: "UNLOCKED";
            position: absolute; top: 10px; right: 15px;
            font-size: 9px; color: var(--glow); font-weight: bold; letter-spacing: 1px;
        }

        .icon-box {
            width: 60px; height: 60px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .unlocked .icon-box {
            background: rgba(0, 255, 255, 0.15);
            border-color: var(--glow);
            text-shadow: 0 0 10px var(--glow);
        }

        .details h3 { margin: 0; font-size: 17px; letter-spacing: 1px; color: #eee; }
        .details p { margin: 5px 0 0; font-size: 12px; color: #666; line-height: 1.4; }
        .unlocked .details p { color: #aaa; }

        .back-nav {
            margin-top: 40px; text-align: center;
        }

        .btn-back {
            background: transparent; color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 40px; border-radius: 30px;
            cursor: pointer; font-size: 13px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-back:hover {
            border-color: var(--glow);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            color: var(--glow);
        }

    </style>
</head>
<body>

    <div class="achievements-wrapper">
        <div class="header">
            <h1>Trophy Room</h1>
            <div class="stats-brief">PROTOCOL: ACTIVE</div>
        </div>
        
        <div class="grid">
            <div class="card unlocked">
                <div class="icon-box">🎖️</div>
                <div class="details">
                    <h3>First Deployment</h3>
                    <p>تم إثبات هويتك في نظام Identity Check بنجاح.</p>
                </div>
            </div>

            <div class="card">
                <div class="icon-box">💀</div>
                <div class="details">
                    <h3>Ghost Walker</h3>
                    <p>تحرك لمسافة 500 متر داخل الفيلا دون رصدك.</p>
                </div>
            </div>

            <div class="card">
                <div class="icon-box">🔧</div>
                <div class="details">
                    <h3>Weapon Smith</h3>
                    <p>قم بتغيير لون السلاح من قائمة الإعدادات.</p>
                </div>
            </div>

            <div class="card">
                <div class="icon-box">🌀</div>
                <div class="details">
                    <h3>Matrix Glitch</h3>
                    <p>اكتشف المنطقة السرية خلف جدران الفيلا.</p>
                </div>
            </div>
        </div>

        <div class="back-nav">
            <button class="btn-back" onclick="location.href='lobby.html'">Return to Command</button>
        </div>
    </div>

</body>
</html>
