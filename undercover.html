<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undercover - Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --ps-blue: #0072ce; --spy-red: #ff3c3c; --glass: rgba(255, 255, 255, 0.1); }
        
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('spy_bg.gif');
            background-size: cover; background-position: center; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        .zizo-hint {
            background: white; color: black; padding: 10px 20px; border-radius: 20px;
            margin-bottom: 30px; position: relative; font-weight: bold;
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }

        .zizo-hint::after {
            content: ''; position: absolute; bottom: -10px; left: 50%;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-top: 10px solid white; transform: translateX(-50%);
        }

        .room-container { display: flex; gap: 40px; justify-content: center; align-items: center; }

        .room-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 30px;
            width: 250px; padding: 30px; text-align: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; color: white;
        }

        .room-card:hover {
            transform: scale(1.1) translateY(-10px);
            border-color: var(--ps-blue);
            box-shadow: 0 0 30px var(--ps-blue);
        }

        .room-icon { width: 120px; height: 120px; margin-bottom: 20px; object-fit: contain; transition: 0.5s; }
        .room-card:hover .room-icon { transform: rotateY(180deg); }

        .room-card h2 { margin: 10px 0; font-size: 24px; font-weight: 900; }
        .room-card p { font-size: 14px; color: #ccc; }

        .back-btn {
            position: absolute; bottom: 40px; color: #777; text-decoration: none;
            font-size: 14px; border: 1px solid #444; padding: 10px 20px; border-radius: 50px;
        }
    </style>
</head>
<body>

    <div class="zizo-hint" id="zizoText">
        😎 زيزو بيقولك: "اختار غرفتك يا وحش وجهز نفسك للهبد!"
    </div>

    <div class="room-container">
        <div onclick="createOnlineRoom()" class="room-card">
            <img src="create_icon.png" class="room-icon" alt="Create">
            <h2>Create Room</h2>
            <p>كون شلتك وابدأ التوزيع</p>
        </div>

        <div onclick="joinOnlineRoom()" class="room-card" style="border-color: var(--spy-red);">
            <img src="join_icon.png" class="room-icon" alt="Join">
            <h2>Join Room</h2>
            <p>ادخل كود الغرفة والعب</p>
        </div>
    </div>

    <a href="game-screen.html" class="back-btn">العودة للمكتبة الرئيسية</a>

    <script>
        // إعدادات الفايربيز بتاعتك (مهمة جداً)
        const firebaseConfig = {
            apiKey: "AIzaSyDCRXJY0Ve5YZIXOOnTVIwU9T1zpCSX-Cs",
            authDomain: "game-745d3.firebaseapp.com",
            databaseURL: "https://game-745d3-default-rtdb.firebaseio.com",
            projectId: "game-745d3",
            storageBucket: "game-745d3.firebasestorage.app",
            messagingSenderId: "907334488624",
            appId: "1:907334488624:web:efb34e82fa22c1fbb313f5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // وظيفة إنشاء غرفة
        function createOnlineRoom() {
            const code = Math.floor(1000 + Math.random() * 9000); // كود من 4 أرقام
            localStorage.setItem('roomCode', code);
            localStorage.setItem('isHost', 'true'); // عشان نعرف إنك الأدمن
            
            // نرفع الكود للسيرفر
            db.ref('rooms/' + code).set({
                status: 'waiting',
                players: {},
                createdAt: Date.now()
            }).then(() => {
                window.location.href = "create_room.html";
            });
        }

        // وظيفة الانضمام
        function joinOnlineRoom() {
            window.location.href = "join_room.html";
        }

        // زيزو البوت (حركاتك زي ما هي)
        const zizoPhrases = [
            "😎 زيزو بيقولك: اختار غرفتك يا وحش!",
            "🕵️‍♂️ شاكك في حد؟ زيزو هيفضحهولك!",
            "🚀 جاهز تطير الجاسوس؟ ابدأ دلوقتي",
            "🔥 القعدة ولعت.. مين الكداب النهاردة؟"
        ];

        setInterval(() => {
            const rand = Math.floor(Math.random() * zizoPhrases.length);
            document.getElementById('zizoText').innerText = zizoPhrases[rand];
        }, 4000);
    </script>
</body>
</html>
