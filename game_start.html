<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiltrator HQ | The Final Spy</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --neon: #39ff14; --spy: #ff0044; --bg: #0a0a0a; }
        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--neon) #111; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
        body { 
            margin: 0; background: var(--bg); background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('game-bg.jpg'); 
            background-size: cover; color: white; font-family: 'Cairo', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }
        .exit-btn {
            position: fixed; top: 15px; left: 15px; color: #fff; text-decoration: none; 
            font-family: 'Orbitron'; font-size: 14px; z-index: 9999;
            background: rgba(221, 0, 0, 0.4); padding: 10px 20px; border-radius: 5px; 
            border: 1px solid var(--spy); cursor: pointer; transition: 0.3s;
        }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 8500;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); text-align: center; padding: 20px;
        }
        .btn-ui { 
            background: none; border: 2px solid var(--neon); color: white; padding: 12px 25px; 
            margin: 8px; cursor: pointer; border-radius: 8px; font-family: 'Orbitron'; 
            transition: 0.3s; min-width: 150px;
        }
        .btn-ui:hover { background: var(--neon); color: black; font-weight: bold; }
        header { 
            height: 110px; background: rgba(0,0,0,0.85); display: flex; 
            overflow-x: auto; align-items: center; gap: 20px; padding: 0 20px;
            border-bottom: 2px solid #222; white-space: nowrap;
        }
        .p-card { position: relative; display: inline-flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .p-img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #333; transition: 0.4s; background: #111; object-fit: cover; }
        .p-num { 
            position: absolute; top: -5px; right: -5px; background: var(--neon); color: black; 
            font-family: 'Orbitron'; font-weight: 900; width: 22px; height: 22px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; 
        }
        .active-turn .p-img { border-color: var(--neon); transform: scale(1.1); box-shadow: 0 0 15px var(--neon); }
        .is-ghost { filter: grayscale(1) opacity(0.4); }
        .game-grid { flex: 1; display: grid; grid-template-columns: 1fr 350px; overflow: hidden; }
        .play-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #timer { font-family: 'Orbitron'; font-size: 60px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .chat-side { background: rgba(0,0,0,0.92); display: flex; flex-direction: column; border-right: 1px solid #111; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; font-size: 14px; }
        .msg-line { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; border-right: 3px solid var(--neon); text-align: right; }
        .input-group { padding: 15px; background: #000; display: flex; gap: 10px; }
        #chatIn { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        .banner { font-family: 'Orbitron'; font-size: 45px; margin-bottom: 20px; }
        .win { color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        .lose { color: var(--spy); text-shadow: 0 0 20px var(--spy); }
        @media (max-width: 768px) { .game-grid { grid-template-columns: 1fr; } .chat-side { height: 250px; } }
    </style>
</head>
<body>

<div class="exit-btn" onclick="forceExit()">← EXIT</div>

<div id="voteUI" class="overlay">
    <h1 style="font-family:'Orbitron'; color:var(--spy)">VOTE THE SPY</h1>
    <div id="voteGrid" style="display:flex; flex-wrap:wrap; justify-content:center; max-width:600px;"></div>
</div>

<div id="resultUI" class="overlay">
    <h1 id="resultTxt" class="banner"></h1>
</div>

<div id="guessUI" class="overlay">
    <h1 id="guessClockDisp" style="font-family:'Orbitron'; font-size:80px; color:var(--spy)">10</h1>
    <h2 id="guessStatus" style="color:var(--neon); font-family:'Orbitron'"></h2>
    <div id="guessGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
</div>

<header id="playerBar"></header>

<div class="game-grid">
    <div class="play-area">
        <div id="timer">00</div>
        <div id="botTalk" style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; text-align:center; width: 80%;">مزامنة البيانات...</div>
        <div id="wordDisplay" style="font-size:45px; font-weight:900; margin-top:30px; letter-spacing:3px;">------</div>
    </div>

    <div class="chat-side">
        <div id="messages"></div>
        <div class="input-group">
            <input type="text" id="chatIn" placeholder="اكتب رسالتك..." onkeypress="if(event.key=='Enter') sendMsg()">
            <button class="btn-ui" style="margin:0; padding:10px 15px;" onclick="sendMsg()">ارسل</button>
        </div>
    </div>
</div>

<script>
    // --- Firebase Config ---
    const firebaseConfig = {
        apiKey: "AIzaSyDCRXJY0Ve5YZIXOOnTVIwU9T1zpCSX-Cs",
        authDomain: "game-745d3.firebaseapp.com",
        databaseURL: "https://game-745d3-default-rtdb.firebaseio.com",
        projectId: "game-745d3",
        storageBucket: "game-745d3.firebasestorage.app",
        messagingSenderId: "907334488624",
        appId: "1:907334488624:web:efb34e82fa22c1fbb313f5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ROOM_CODE = localStorage.getItem('activeRoomCode') || "9901";
    const myName = localStorage.getItem('playerName') || "عميل مجهول";
    const myImg = localStorage.getItem('savedImg') || "";
    const myId = "user_" + Math.floor(Math.random() * 1000000);

    let players = [];
    let gameState = {};
    let isSpy = false;

    // --- مزامنة حالة اللعبة ---
    db.ref(`rooms/${ROOM_CODE}/game`).on('value', (snap) => {
        gameState = snap.val();
        if (!gameState) return;

        // تحديث الكلمة
        isSpy = gameState.spyId === myId;
        document.getElementById('wordDisplay').innerText = isSpy ? "أنت الجاسوس! 🕵️‍♂️" : "الكلمة: " + gameState.secretWord;

        // تحديث الشاشة بناءً على المرحلة
        handlePhaseChange(gameState.phase);
        
        // تحديث التايمر
        document.getElementById('timer').innerText = gameState.timer || "00";
        if (gameState.phase === 'guessing') {
            document.getElementById('guessClockDisp').innerText = gameState.timer;
        }

        // تحديث نص الدور
        if (gameState.phase === 'playing') {
            const p1 = players.find(p => p.id === gameState.currentSpeaker);
            const p2 = players.find(p => p.id === gameState.currentReceiver);
            if (p1 && p2) {
                document.getElementById('botTalk').innerText = `${p1.name} اسأل ${p2.name}`;
                renderBar(p1.id);
            }
        }
    });

    // --- مزامنة اللاعبين في الروم ---
    db.ref('players').on('value', (snap) => {
        const allPlayers = snap.val() || {};
        players = Object.keys(allPlayers)
            .map(id => ({ id, ...allPlayers[id] }))
            .filter(p => p.room === ROOM_CODE);
        renderBar();
    });

    function renderBar(activeId = null) {
        const bar = document.getElementById('playerBar');
        bar.innerHTML = '';
        players.forEach((p, index) => {
            bar.innerHTML += `
                <div class="p-card ${activeId === p.id ? 'active-turn' : ''} ${p.isGhost ? 'is-ghost' : ''}">
                    <div class="p-num">${index + 1}</div>
                    <img src="${p.img || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + p.id}" class="p-img">
                </div>`;
        });
    }

    function handlePhaseChange(phase) {
        const overlays = ['voteUI', 'resultUI', 'guessUI'];
        overlays.forEach(id => document.getElementById(id).style.display = 'none');

        if (phase === 'voting') {
            openVote();
        } else if (phase === 'result') {
            document.getElementById('resultUI').style.display = 'flex';
            document.getElementById('resultTxt').innerText = gameState.resultMsg;
        } else if (phase === 'guessing') {
            openGuess();
        } else if (phase === 'end') {
            document.getElementById('resultUI').style.display = 'flex';
            document.getElementById('resultTxt').innerHTML = `<span class="${gameState.win ? 'win' : 'lose'}">${gameState.resultMsg}</span>`;
            setTimeout(forceExit, 4000);
        }
    }

    function openVote() {
        const ui = document.getElementById('voteUI');
        ui.style.display = 'flex';
        const grid = document.getElementById('voteGrid');
        grid.innerHTML = '';
        players.forEach(p => {
            if (!p.isGhost) {
                grid.innerHTML += `<button class="btn-ui" onclick="castVote('${p.id}')">${p.name}</button>`;
            }
        });
    }

    function castVote(targetId) {
        document.getElementById('voteUI').style.display = 'none';
        // إرسال التصويت للسيرفر (في العادة الهوست هو اللي بيعالج ده)
        db.ref(`rooms/${ROOM_CODE}/votes/${myId}`).set(targetId);
    }

    function openGuess() {
        const ui = document.getElementById('guessUI');
        ui.style.display = 'flex';
        const grid = document.getElementById('guessGrid');
        grid.innerHTML = '';
        
        if (isSpy) {
            document.getElementById('guessStatus').innerText = "خمن الكلمة بسرعة!";
            gameState.options.forEach(w => {
                grid.innerHTML += `<button class="btn-ui" onclick="submitGuess('${w}')">${w}</button>`;
            });
        } else {
            document.getElementById('guessStatus').innerText = "الجاسوس يحاول التخمين...";
        }
    }

    function submitGuess(word) {
        db.ref(`rooms/${ROOM_CODE}/game/submittedGuess`).set(word);
    }

    function sendMsg() {
        const inp = document.getElementById('chatIn');
        if (!inp.value.trim()) return;
        db.ref(`rooms/${ROOM_CODE}/chat`).push({
            sender: myName,
            text: inp.value,
            timestamp: Date.now()
        });
        inp.value = '';
    }

    db.ref(`rooms/${ROOM_CODE}/chat`).limitToLast(10).on('child_added', (snap) => {
        const data = snap.val();
        const msgBox = document.getElementById('messages');
        msgBox.innerHTML += `<div class="msg-line"><b style="color:var(--neon)">${data.sender}:</b> ${data.text}</div>`;
        msgBox.scrollTop = msgBox.scrollHeight;
    });

    function forceExit() {
        window.location.replace("index.html");
    }
</script>
</body>
</html>
