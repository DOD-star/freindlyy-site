<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سينما الفوازير - Rainbow Ultra</title>
    <style>
        /* خلفية رينبو متحركة */
        body { 
            margin: 0; overflow: hidden; 
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(125deg, #2c3e50, #000, #2c3e50);
            background-size: 400% 400%;
            animation: rainbowBG 15s ease infinite;
        }

        @keyframes rainbowBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* كود الغرفة (يمين فوق) */
        #room-tag {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; text-align: center; z-index: 2000;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }
        #room-tag span { display: block; font-size: 12px; color: #ff4757; font-weight: bold; }
        #room-tag b { font-size: 24px; letter-spacing: 3px; color: #f1c40f; }

        /* اللوبي الجانبي */
        #players-lobby {
            position: absolute; top: 50%; left: 20px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 1000;
        }
        .slot { 
            display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateX(-300px); transition: 0.5s ease-out;
        }
        .slot.show { transform: translateX(0); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #f1c40f; }
        .p-name { color: #fff; font-size: 14px; font-weight: bold; }

        /* شات الحل */
        #quiz-chat {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 420px; background: rgba(0, 0, 0, 0.8); padding: 20px;
            border-radius: 20px; border: 1px solid #444; z-index: 1000;
        }
        input { width: 85%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; background: #1a1a1a; color: #fff; text-align: center; }
        button { padding: 12px; background: #ff4757; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }

        #status { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; font-weight: bold; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="room-tag">
        <span>رقم الغرفة</span>
        <b id="room-id">----</b>
    </div>

    <div id="status"></div>

    <div id="players-lobby"></div>

    <div id="quiz-chat" style="display: none;">
        <input type="text" id="ans-input" placeholder="اكتب اسم الفنان هنا...">
        <button onclick="submitAns()">إرسال الحل 🚀</button>
    </div>

    <div id="login-screen" style="position:absolute; z-index:3000; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; padding:30px; border-radius:20px; color:white; text-align:center;">
        <h2>أهلاً بك في السينما 🎬</h2>
        <input type="text" id="p-name" placeholder="اسمك.."> <br>
        <input type="text" id="r-code" placeholder="كود الغرفة.."> <br>
        <button onclick="startGame()">ابدأ العرض</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, clock, mixer, screenMesh, currentIdx = 1;
        clock = new THREE.Clock();
        const answers = ["", "عادل امام", "احمد زكي", "نور الشريف", "محمود عبدالعزيز"];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // إضاءة ملونة خفيفة
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            let blueL = new THREE.PointLight(0x00ffff, 1, 50);
            blueL.position.set(-10, 10, 10);
            scene.add(blueL);

            createScreen();
            loadAssets();
            animate();
        }

        function createScreen() {
            const geo = new THREE.PlaneGeometry(16, 9);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            screenMesh = new THREE.Mesh(geo, mat);
            screenMesh.position.set(0, 7.5, -5);
            scene.add(screenMesh);
        }

        function loadAssets() {
            const loader = new THREE.GLTFLoader();
            loader.load('cinema_stage.glb', (g) => scene.add(g.scene));
            loader.load('joker_dancer.glb', (g) => {
                const p = g.scene;
                const b = new THREE.Box3().setFromObject(p);
                const sc = 1.8 / b.getSize(new THREE.Vector3()).y;
                p.scale.set(sc, sc, sc);
                p.position.set(0, 2.5, 0); 
                scene.add(p);
                if(g.animations[0]) {
                    mixer = new THREE.AnimationMixer(p);
                    mixer.clipAction(g.animations[0]).play();
                }
            });
        }

        function startGame() {
            const name = document.getElementById('p-name').value;
            const code = document.getElementById('r-code').value;
            if(!name || !code) return;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-chat').style.display = 'block';
            document.getElementById('room-id').innerText = code;

            addPlayer(name);
            updatePoster();
        }

        function addPlayer(name) {
            const lobby = document.getElementById('players-lobby');
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerHTML = `
                <div class="avatar"><img src="https://via.placeholder.com/50/FF4757/FFF?text=${name[0]}"></div>
                <div class="p-name">${name}</div>
            `;
            lobby.appendChild(slot);
            setTimeout(() => slot.classList.add('show'), 100);
        }

        function submitAns() {
            const val = document.getElementById('ans-input').value.trim();
            const s = document.getElementById('status');
            if(val === answers[currentIdx]) {
                s.innerText = "لعييييييب 🔥"; s.style.color = "#f1c40f";
            } else {
                s.innerText = "مديون بـ 10 نقط 💀"; s.style.color = "#ff4757";
            }
            s.style.display = 'block';
            setTimeout(() => s.style.display = 'none', 1500);
            currentIdx = (currentIdx % 4) + 1;
            document.getElementById('ans-input').value = "";
            updatePoster();
        }

        function updatePoster() {
            new THREE.TextureLoader().load(`${currentIdx}.jpg`, (t) => {
                screenMesh.material.map = t;
                screenMesh.material.needsUpdate = true;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(mixer) mixer.update(clock.getDelta());
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
