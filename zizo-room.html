<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة التحكم | زيزو</title>
    <style>
        :root {
            --ps-blue: #0072ce;
            --neon-cyan: #00f2ff;
            --ready-green: #2ecc71;
            --empty-slot: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: #02050a;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('zizo-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--ps-blue);
        }

        .players-hub {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        .player-slot {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 50px 15px 15px 50px;
            border-left: 4px solid var(--neon-cyan);
            transition: 0.3s;
            min-height: 100px;
        }

        .player-slot.empty {
            border-left: 4px dashed #444;
            background: var(--empty-slot);
            opacity: 0.6;
        }

        .platform {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            overflow: hidden;
            box-shadow: 0 0 15px var(--neon-cyan);
            background: #111;
        }

        .player-avatar { width: 100%; height: 100%; object-fit: cover; }
        .player-info h4 { font-size: 1.1rem; }
        .status-text { font-size: 0.8rem; color: #aaa; }
        .is-ready { color: var(--ready-green) !important; font-weight: bold; }

        .side-menu {
            position: fixed;
            left: 30px;
            bottom: 40px;
            z-index: 100;
        }

        .ready-btn {
            background: var(--ready-green);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .zizo-footer {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; letter-spacing: 2px;">NEURAL LINK: <span id="room-code" style="color:var(--neon-cyan)">---</span></div>
        <div>الموضوع السري: <span id="mission-status" style="color:orange">في انتظار الفريق...</span></div>
    </header>

    <div class="players-hub" id="players-list">
        <div class="player-slot empty" id="slot-0">
            <div class="platform"><img src="" class="player-avatar" style="display:none"></div>
            <div class="player-info"><h4>مكان شاغر</h4><p class="status-text">في انتظار لاعب...</p></div>
        </div>
        <div class="player-slot empty" id="slot-1">
            <div class="platform"><img src="" class="player-avatar" style="display:none"></div>
            <div class="player-info"><h4>مكان شاغر</h4><p class="status-text">في انتظار لاعب...</p></div>
        </div>
        <div class="player-slot empty" id="slot-2">
            <div class="platform"><img src="" class="player-avatar" style="display:none"></div>
            <div class="player-info"><h4>مكان شاغر</h4><p class="status-text">في انتظار لاعب...</p></div>
        </div>
        <div class="player-slot empty" id="slot-3">
            <div class="platform"><img src="" class="player-avatar" style="display:none"></div>
            <div class="player-info"><h4>مكان شاغر</h4><p class="status-text">في انتظار لاعب...</p></div>
        </div>
    </div>

    <div class="side-menu">
        <button class="ready-btn" onclick="triggerReady()">READY</button>
    </div>

    <div class="zizo-footer">
        <p id="zizo-msg">>>> زيزو: "النظام متصل.. بانتظار دخول الفريق إلى الغرفة."</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // تم وضع الكونفيج الخاص بك هنا
        const firebaseConfig = {
            apiKey: "AIzaSyDl6YLqSMoP9Jc4RV_m4SFknwntBIsMpG4",
            authDomain: "zizo-78bba.firebaseapp.com",
            databaseURL: "https://zizo-78bba-default-rtdb.firebaseio.com",
            projectId: "zizo-78bba",
            storageBucket: "zizo-78bba.firebasestorage.app",
            messagingSenderId: "277529747737",
            appId: "1:277529747737:web:c16ba066d7c94ca2236588",
            measurementId: "G-NZ7QL5SX1K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب البيانات اللي تسجلت في الـ index
        const savedData = localStorage.getItem('userData');
        const userAvatar = localStorage.getItem('userAvatar') || "https://api.dicebear.com/7.x/avataaars/svg?seed=Zizo";
        
        let playerName = "لاعب مجهول";
        if(savedData) {
            const parsed = JSON.parse(savedData);
            playerName = parsed.name || "لاعب مجهول";
        }

        const roomCode = localStorage.getItem('activeRoom') || "7777";
        document.getElementById('room-code').innerText = roomCode;

        // معرف فريد عشان لو فتحت من كذا جهاز
        const userId = "user_" + Math.random().toString(36).substr(2, 9);
        const userRef = ref(db, `rooms/${roomCode}/players/${userId}`);

        // إرسال البيانات فوراً للداتابيز
        set(userRef, {
            name: playerName,
            avatar: userAvatar,
            ready: false
        });

        onDisconnect(userRef).remove();

        onValue(ref(db, `rooms/${roomCode}/players`), (snapshot) => {
            const players = snapshot.val();
            for(let i=0; i<4; i++) {
                const slot = document.getElementById(`slot-${i}`);
                slot.className = "player-slot empty";
                slot.querySelector('h4').innerText = "مكان شاغر";
                slot.querySelector('.status-text').innerText = "في انتظار لاعب...";
                slot.querySelector('.status-text').classList.remove('is-ready');
                slot.querySelector('img').style.display = "none";
            }

            if (players) {
                let index = 0;
                Object.keys(players).forEach(id => {
                    if(index < 4) {
                        const p = players[id];
                        const slot = document.getElementById(`slot-${index}`);
                        slot.className = "player-slot";
                        slot.querySelector('h4').innerText = p.name;
                        
                        const statusTag = slot.querySelector('.status-text');
                        if (p.ready) {
                            statusTag.innerText = "● READY";
                            statusTag.classList.add('is-ready');
                        } else {
                            statusTag.innerText = "متصل الآن";
                        }

                        const img = slot.querySelector('img');
                        img.src = p.avatar;
                        img.style.display = "block";
                        index++;
                    }
                });
            }
        });

        window.triggerReady = function() {
            update(userRef, { ready: true });
            document.getElementById('zizo-msg').innerText = ">>> زيزو: 'تم تأكيد جاهزيتك للمهمة!'";
        };
    </script>
</body>
</html>
