<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة التحكم | زيزو</title>
    <style>
        :root {
            --ps-blue: #0072ce;
            --neon-cyan: #00f2ff;
            --ready-green: #2ecc71;
            --empty-slot: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: #02050a;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('zizo-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--ps-blue);
        }

        .players-hub {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        .player-slot {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 50px 15px 15px 50px;
            border-left: 4px solid var(--neon-cyan);
            transition: 0.3s;
            min-height: 100px;
        }

        /* شكل المكان الفاضي */
        .player-slot.empty {
            border-left: 4px dashed #444;
            background: var(--empty-slot);
            opacity: 0.6;
        }

        .platform {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            overflow: hidden;
            box-shadow: 0 0 15px var(--neon-cyan);
            background: #111;
        }

        .player-avatar { width: 100%; height: 100%; object-fit: cover; }

        .player-info h4 { font-size: 1.1rem; }
        .status-text { font-size: 0.8rem; color: #aaa; }
        .is-ready { color: var(--ready-green) !important; font-weight: bold; }

        .side-menu {
            position: fixed;
            left: 30px;
            bottom: 40px;
            z-index: 100;
        }

        .ready-btn {
            background: var(--ready-green);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .ready-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 0 30px var(--ready-green);
        }

        .zizo-footer {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; letter-spacing: 2px;">NEURAL LINK: <span id="room-code" style="color:var(--neon-cyan)">---</span></div>
        <div>الموضوع السري: <span id="mission-status" style="color:orange">في انتظار الفريق...</span></div>
    </header>

    <div class="players-hub" id="players-list">
        <div class="player-slot" id="my-slot">
            <div class="platform"><img src="https://via.placeholder.com/70" id="my-img" class="player-avatar"></div>
            <div class="player-info">
                <h4 id="my-name">جاري التحميل...</h4>
                <p class="status-text" id="my-status">أنت متصل الآن</p>
            </div>
        </div>

        <div class="player-slot empty">
            <div class="platform"></div>
            <div class="player-info">
                <h4>مكان شاغر</h4>
                <p class="status-text">في انتظار لاعب...</p>
            </div>
        </div>

        <div class="player-slot empty">
            <div class="platform"></div>
            <div class="player-info">
                <h4>مكان شاغر</h4>
                <p class="status-text">في انتظار لاعب...</p>
            </div>
        </div>

        <div class="player-slot empty">
            <div class="platform"></div>
            <div class="player-info">
                <h4>مكان شاغر</h4>
                <p class="status-text">في انتظار لاعب...</p>
            </div>
        </div>
    </div>

    <div class="side-menu">
        <button class="ready-btn" onclick="startSecretTopic()">READY</button>
    </div>

    <div class="zizo-footer">
        <p id="zizo-msg">>>> زيزو: "مرحباً بك في النظام.. بانتظار انضمام بقية الفريق من طنطا وباقي المحافظات."</p>
    </div>

    <script>
        // جلب بياناتك من المتصفح
        const userData = JSON.parse(localStorage.getItem('userData')) || {name: "لاعب مجهول"};
        const userAvatar = localStorage.getItem('userAvatar') || "https://via.placeholder.com/70";
        const roomCode = localStorage.getItem('activeRoom') || "7777";

        document.getElementById('my-name').innerText = userData.name;
        document.getElementById('my-img').src = userAvatar;
        document.getElementById('room-code').innerText = roomCode;

        function startSecretTopic() {
            // تفعيل حالة الجاهزية عندك
            document.getElementById('my-status').innerText = "● READY";
            document.getElementById('my-status').classList.add('is-ready');
            document.getElementById('mission-status').innerText = "تم تأكيد الجاهزية";
            document.getElementById('mission-status').style.color = "var(--ready-green)";
            document.getElementById('zizo-msg').innerText = ">>> زيزو: 'تم تسجيل جاهزيتك.. سيتم فتح الملف السري فور اكتمال الفريق.'";
            
            // تنبيه: جيت هاب هيفتح الصفحة بس مش هيحفظ حالة "Ready" لصحابك التانيين إلا بـ Firebase
            setTimeout(() => {
                alert("جاهز للمهمة! ارفع الملف الثاني (final-secret.html) عشان النقل يشتغل.");
            }, 1000);
        }
    </script>
</body>
</html>
