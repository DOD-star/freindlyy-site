<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صراحة ولا جرأة - البداية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d2ff; --spy: #9d50bb; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Cairo', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%); z-index: -1; }
        .container { text-align: center; z-index: 10; width: 100%; }
        h1 { font-size: 50px; font-weight: 900; background: linear-gradient(to right, var(--neon), var(--spy)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 30px; width: 220px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .card:hover { transform: translateY(-10px); border-color: var(--neon); background: rgba(255,255,255,0.07); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--neon); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; box-sizing: border-box; outline: none; }
        .btn { background: linear-gradient(90deg, var(--neon), var(--spy)); color: #fff; padding: 12px; width: 100%; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <h1>صراحة ولا جرأة</h1>
        <div class="cards">
            <div class="card" onclick="openModal('create')"><h2>✨ إنشاء</h2><p>ابدأ غرفة جديدة</p></div>
            <div class="card" onclick="openModal('join')"><h2>🔑 انضمام</h2><p>ادخل بكود صاحبك</p></div>
        </div>
    </div>

    <div id="modal" class="overlay">
        <div class="modal">
            <h2 id="mTitle"></h2>
            <input type="text" id="pName" placeholder="اسمك المستعار">
            <input type="text" id="rCode" placeholder="كود الغرفة #1234" style="display:none">
            <button class="btn" onclick="start()">انطلق 🚀</button>
            <p style="color:#555; cursor:pointer; margin-top:10px;" onclick="closeModal()">إلغاء</p>
        </div>
    </div>

    <script>
        let mode = '';
        function openModal(m) {
            mode = m;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('mTitle').innerText = m === 'create' ? 'إنشاء غرفة' : 'انضمام لغرفة';
            document.getElementById('rCode').style.display = m === 'join' ? 'block' : 'none';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function start() {
            const name = document.getElementById('pName').value;
            const code = document.getElementById('rCode').value;
            if(!name) return alert("اكتب اسمك!");
            localStorage.setItem('playerName', name);
            if(mode === 'create') {
                const newCode = Math.floor(1000 + Math.random() * 9000);
                localStorage.setItem('currentRoomCode', newCode);
                window.location.href = "truth_create.html";
            } else {
                if(!code) return alert("فين الكود؟");
                localStorage.setItem('currentRoomCode', code);
                window.location.href = "truth_create.html";
            }
        }
    </script>
</body>
</html>
