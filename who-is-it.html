<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مين فينا؟ | النسخة النهائية ⚔️</title>
    <style>
        :root { --neon: #00ff88; --hot-pink: #ff3e6c; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* الشاشات */
        .screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .hidden { display: none !important; }

        /* كرت الدخول */
        .login-box { background: #111; padding: 40px; border-radius: 30px; border: 2px solid var(--neon); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0,255,136,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: white; text-align: center; font-size: 1.1rem; }
        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; background: var(--neon); color: black; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--neon); }

        /* واجهة اللعبة */
        .game-container { display: flex; width: 100%; height: 100%; }
        .chat-side { flex: 1; background: #0a0a0a; border-left: 1px solid #222; display: flex; flex-direction: column; }
        .game-side { flex: 2.5; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; }

        /* كروت الصحاب (موديلات) */
        .players-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 600px; margin: 20px 0; }
        .p-card { background: var(--glass); border: 1px solid #333; padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .p-card:hover { border-color: var(--hot-pink); transform: translateY(-5px); background: rgba(255, 62, 108, 0.1); }
        .p-card .avatar { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* منطقة السؤال */
        .q-box { text-align: center; background: rgba(255,255,255,0.03); padding: 30px; border-radius: 30px; width: 100%; max-width: 600px; border: 1px dashed #444; }
        .q-text { font-size: 1.6rem; font-weight: 800; color: var(--neon); text-shadow: 0 0 10px rgba(0,255,136,0.3); }

        /* الشات */
        #chatMsgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; max-width: 85%; line-height: 1.4; }
        .msg-in { background: #1a1a1a; align-self: flex-start; }
        .msg-out { background: #004422; align-self: flex-end; border-bottom-right-radius: 2px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="login-box">
            <h1 style="color:var(--neon); margin-top:0;">مين فينا؟ 🤔</h1>
            <p style="color:#888; font-size:0.9rem;">ادخل الكود عشان تبدأ السهرة</p>
            <input type="text" id="nameInp" placeholder="اسمك إيه يا وحش؟">
            <input type="number" id="roomInp" placeholder="كود الغرفة (مثلاً 1234)">
            <button class="btn-main" onclick="initGame()">إنشاء / دخول الغرفة</button>
        </div>
    </div>

    <div id="main-game" class="game-container hidden">
        
        <div class="chat-side">
            <div style="padding:20px; border-bottom:1px solid #222; color:var(--hot-pink); font-weight:900;">الردح المباشر 💬</div>
            <div id="chatMsgs"></div>
            <div style="padding:15px; display:flex; gap:8px;">
                <input type="text" id="msgInp" placeholder="ارمي فضيحة.." style="margin:0; font-size:0.9rem;">
                <button onclick="sendMsg()" style="background:var(--neon); border:none; border-radius:12px; padding:0 15px; cursor:pointer; font-weight:bold;">↑</button>
            </div>
        </div>

        <div class="game-side">
            <div style="text-align:center;">
                <span style="background:var(--hot-pink); padding:4px 12px; border-radius:50px; font-size:0.7rem; font-weight:bold;">سؤال عشوائي 🎲</span>
                <div class="q-box" style="margin-top:15px;">
                    <div class="q-text" id="qText">جاري تجهيز الفضايح...</div>
                </div>
            </div>

            <div class="players-grid" id="playersGrid"></div>

            <button class="btn-main" style="background:none; border:2px solid var(--neon); color:var(--neon); width:auto; padding:12px 40px;" onclick="getInfiniteQuestion()">السؤال التالي ⏭️</button>
            
            <div style="font-size:0.8rem; color:#444;">الغرفة: #<span id="roomCodeVal"></span> | اللاعب: <span id="myNameVal"></span></div>
        </div>
    </div>

    <script>
        // --- مخزن الأسئلة اللانهائي ---
        const infiniteQs = [
            "مين أكتر واحد هيخلص أكل التيم كله؟",
            "مين أكتر واحد ممكن يتسجن في جريمة غبية؟",
            "مين أكتر واحد بيعمل 'Seen' ومبيردش؟",
            "مين أكتر واحد ريحته بتظهر بعد 5 دقايق لعب؟",
            "مين أكتر واحد هيعمل نفسه نايم وقت الحساب؟",
            "مين أكتر واحد بيحور في حكاياته؟",
            "مين أكتر واحد ممكن يبيع صاحبه عشان شاورما؟",
            "مين أكتر واحد دايماً موبايله فصل شحن؟",
            "مين أكتر واحد 'بومة' وبينق على أي حاجة؟",
            "مين أكتر واحد صوته في الغنا يقطع الخميرة من البيت؟",
            "مين أكتر واحد بيخاف من أفلام الرعب؟",
            "مين أكتر واحد ممكن يكلم نفسه وهو ماشي؟",
            "مين أكتر واحد بياخد سيلفي كل 5 دقائق؟",
            "مين أكتر واحد هينسى صحابه لما يخطب؟",
            "مين أكتر واحد مبيستحماش في الشتا؟",
            "مين أكتر واحد دايماً بيتأخر على المواعيد؟",
            "مين أكتر واحد بيعمل مصايب ومبيتمسكش؟",
            "مين أكتر واحد ممكن يتوه وهو رايح السوبر ماركت؟",
            "مين أكتر واحد دحيح بس بيمثل الفشل؟",
            "مين أكتر واحد بيصدق أي إشاعة؟"
        ];

        let myName = "";
        let roomCode = "";

        // أول ما الصفحة تفتح، تشوف لو فيه اسم متسيف من اللودو
        window.onload = () => {
            const saved = localStorage.getItem('ludo_name');
            if(saved) document.getElementById('nameInp').value = saved;
        };

        function initGame() {
            myName = document.getElementById('nameInp').value;
            roomCode = document.getElementById('roomInp').value;

            if(!myName || !roomCode) return alert("اكتب اسمك وكود الغرفة يا بطل!");

            localStorage.setItem('ludo_name', myName); // حفظ الاسم
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-game').classList.remove('hidden');
            
            document.getElementById('roomCodeVal').innerText = roomCode;
            document.getElementById('myNameVal').innerText = myName;

            renderPlayers();
            getInfiniteQuestion();
            addChatMsg("سيستم", `يا هلا بـ ${myName}! بدأت حفلة الفضايح في الغرفة ${roomCode} 😈`, "in");
        }

        function renderPlayers() {
            const grid = document.getElementById('playersGrid');
            const icons = ["😎", "🤡", "🦊", "🦖", "🥷", "👻"];
            // محاكاة لاعبين (دي اللي هتتغير في الأونلاين الحقيقي)
            const demoPlayers = [myName, "حمادة", "زيزو", "بيبو"];
            
            grid.innerHTML = "";
            demoPlayers.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = "p-card";
                card.innerHTML = `<span class="avatar">${icons[i] || "👤"}</span><span>${p}</span>`;
                card.onclick = () => {
                    sendAutoVote(p);
                };
                grid.appendChild(card);
            });
        }

        function getInfiniteQuestion() {
            const randomQ = infiniteQs[Math.floor(Math.random() * infiniteQs.length)];
            document.getElementById('qText').innerText = randomQ;
        }

        function sendAutoVote(votedPerson) {
            const text = `بقولكم إيه.. ${votedPerson} هو اللي لايق عليه السؤال ده جداً! 😂`;
            addChatMsg(myName, text, "out");
        }

        function sendMsg() {
            const inp = document.getElementById('msgInp');
            if(!inp.value) return;
            addChatMsg(myName, inp.value, "out");
            inp.value = "";
        }

        function addChatMsg(user, text, type) {
            const box = document.getElementById('chatMsgs');
            const m = document.createElement('div');
            m.className = `msg msg-${type}`;
            m.innerHTML = `<b style="color:var(--neon)">${user}:</b> ${text}`;
            box.appendChild(m);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
